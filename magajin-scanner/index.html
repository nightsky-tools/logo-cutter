<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マガジン記事スキャナ v1.8</title>
<style>
  :root {
    --night: #0c0f22; --panel: #14182f; --panel-edge: #232849;
    --moonlight: #e9e7f2; --dim: #8e8aa8;
    --ok: #9fd8b4; --ng: #e8938f; --warn: #f0d9a0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--night); color: var(--moonlight);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    min-height: 100vh; padding: 28px 16px 64px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 24px; }
  h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-weight: 600; font-size: 1.4rem; letter-spacing: .14em;
  }
  .sub { color: var(--dim); font-size: .76rem; letter-spacing: .2em; margin-top: 8px; }
  label { display: block; color: var(--dim); font-size: .78rem; letter-spacing: .14em; margin: 18px 0 8px; }
  textarea {
    width: 100%; min-height: 170px; resize: vertical;
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--moonlight); border-radius: 12px; padding: 14px;
    font-size: .85rem; line-height: 1.7; font-family: inherit;
  }
  textarea:focus-visible { outline: 2px solid #a9c5e2; outline-offset: 2px; }
  .run-btn {
    display: block; width: 100%; margin-top: 20px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--moonlight); border-radius: 12px; padding: 14px;
    font-size: .95rem; font-family: inherit; letter-spacing: .12em; cursor: pointer;
    transition: border-color .2s;
  }
  .run-btn:hover, .run-btn:focus-visible { border-color: var(--dim); }
  #report { margin-top: 26px; display: none; }
  .verdict {
    text-align: center; font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 1.25rem; letter-spacing: .2em; padding: 16px;
    border-radius: 12px; border: 1px solid var(--panel-edge); margin-bottom: 18px;
  }
  .verdict.pass { color: var(--ok); border-color: rgba(159,216,180,.4); }
  .verdict.fail { color: var(--ng); border-color: rgba(232,147,143,.4); }
  .verdict.cond { color: var(--warn); border-color: rgba(240,217,160,.4); }
  .section {
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 12px; padding: 16px 18px; margin-bottom: 14px;
  }
  .section h2 {
    font-size: .8rem; color: var(--dim); letter-spacing: .16em;
    font-weight: normal; margin-bottom: 10px;
  }
  .item { font-size: .84rem; line-height: 1.8; padding-left: 1.4em; text-indent: -1.4em; }
  .item .mark { display: inline-block; width: 1.4em; text-indent: 0; }
  .ok { color: var(--ok); } .ng { color: var(--ng); } .wa { color: var(--warn); }
  .copy-btn {
    display: block; width: 100%; margin-top: 6px;
    background: transparent; border: 1px solid var(--panel-edge);
    color: var(--moonlight); border-radius: 10px; padding: 12px;
    font-size: .9rem; font-family: inherit; letter-spacing: .1em; cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--dim); }
  .copy-btn.done { border-color: var(--ok); color: var(--ok); }
  .part {
    background: var(--panel); border: 1px solid var(--panel-edge);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
  }
  .part h3 { font-size: .78rem; color: var(--dim); letter-spacing: .16em; font-weight: normal; margin-bottom: 8px; }
  .part pre {
    white-space: pre-wrap; word-break: break-all; font-family: inherit;
    font-size: .8rem; line-height: 1.7; max-height: 130px; overflow: hidden;
    color: var(--moonlight); opacity: .85;
  }
  .part .meta-line { color: var(--dim); font-size: .72rem; margin-top: 6px; }
  .part button {
    display: block; width: 100%; margin-top: 10px;
    background: transparent; border: 1px solid var(--panel-edge);
    color: var(--moonlight); border-radius: 8px; padding: 10px;
    font-size: .86rem; font-family: inherit; letter-spacing: .1em; cursor: pointer;
  }
  .part button:hover { border-color: var(--dim); }
  .part button.done { border-color: var(--ok); color: var(--ok); }

  footer { text-align: center; color: var(--dim); font-size: .68rem; letter-spacing: .12em; margin-top: 32px; line-height: 1.9; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>マガジン記事スキャナ</h1>
    <div class="sub">検品命令書 v1.2 準拠 ・ A〜C機械判定 / D〜F注意検出 / 入稿用分割 ・ v1.8(新月・満月・カレンダー・水星逆行対応)</div>
  </header>

  <label for="tableIn">① ジェネレーター出力のMarkdown表(v1.4/v1.5形式・自動取り込みあり)</label>
  <textarea id="tableIn" placeholder="| 項目 | 内容 | から始まる表を貼り付け"></textarea>

  <label for="articleIn">② 記事全文(メタブロック・タイトル・画像プロンプト込み)</label>
  <textarea id="articleIn" placeholder="<!-- 種別: ... --> から末尾まで全文を貼り付け"></textarea>

  <button class="run-btn" id="runBtn">スキャンする</button>
  <button class="run-btn" id="splitBtn" style="margin-top:10px;">入稿用に分割(記事だけでOK)</button>

  <div id="splitOut" style="display:none; margin-top:22px;"></div>

  <div id="report">
    <div class="verdict" id="verdict"></div>
    <div id="sections"></div>
    <button class="copy-btn" id="copyReport">検品レポートをコピー</button>
  </div>

  <footer>
    このスキャナは機械判定(A天文照合・B字数構成・C形式)と語彙ベースの注意検出(D〜F)のみを行う。<br>
    D〜Fの最終判断とE(食・可視性)の文脈判定は検品AIまたは人間が行うこと。
  </footer>
</div>

<script>
/* =========================================================
   【v1.8 変更履歴】(生成命令書v1.6・検品命令書v1.2対応 2026-07-20)
   ・水星逆行記事に対応: 逆行用手動表(生成§1)のパース、A-1/A-2を
     開始・終了の両方照合、A-5で主役の水星は捏造判定から除外、
     C-2逆行タイトル規則、C-5はMercury照合、D-9(M-6不安訴求)走査。
     48時間期限の導出は月相記事のみに限定。
   ・月初カレンダー記事に対応(v1.7までの非対応を解消・生成§10):
     「まとめてコピー」の複数イベント表をパースし、A区分を全イベント
     照合。B-2章別/B-5星座字数はスキップ(3章・2,000〜3,000字判定)。
     C-2カレンダー題名規則、C-5はphases of the moon照合。
   ・D-1に過去構文9語の走査を追加(本家スキャナv2.5のDICT.PAST_WORDS
     と同一。主語の意味判定は検品チャット)。
   ・SEASON_WORDSを本家スキャナv2.5のDICT.SEASON_WORDS(39語)との
     和集合に拡張(本家側を変更したら本欄も同時改訂)。
   ・A〜C既存ロジック・FIXED_COPY_M・判定基準は無変更。
   【v1.8 同日修正】
   ・逆行表キーの全角括弧（）に対応(拾えず照合が空振りするバグの修正)。
   ・日時照合を空白非依存に(「9月2日10:15」等の空白なし表記でも一致)。
   ・カレンダー判定をメタ種別/タイトルの明示に限定(本文中の「カレンダー」
     の語での誤発動を解消)。
   ・A-6/7の文言を実態に合わせ(48時間導出は月相記事のみ)、逆行記事に
     期間長の参考行を追加(検品A-7の転記元・判定には不使用)。
   ・7/29実記事の実走で発見: 画像プロンプトの「【画像プロンプト】」
     見出し形式を受理対象に追加(従来の■形式も引き続き受理)。
   ・8/13実走反映: メタの文字数申告の読み取りを寛容化(「本文実測」等の
     前置き語つきでも数値を取得)。
   ・同実走反映(同日訂正): A-8で「値は表と同じだが表記が違う度数」を
     ✗(表記不一致)に昇格。※当初「表は分2桁」と誤認したが実ジェネレー
     ターは2桁詰めをしないため、正は「表のまま転記」。D-1で第4章内の過去構文9語を✗に昇格
     (生成2-Aの現在形規定・主語判定不要の機械判定化)。
   ========================================================= */
const $ = id => document.getElementById(id);
const esc = x => String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const strip = s => s.replace(/[\s\u3000]/g, "");
const normHM = s => s.replace(/^0(\d:)/, "$1");
const z2h = s => s.replace(/[０-９：／]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

// ---------- ジェネレーター表のパース ----------
function parseTable(src) {
  src = z2h(src);
  const rows = {};
  src.split("\n").forEach(line => {
    const m = line.match(/^\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*$/);
    if (m && m[1] !== "項目" && !/^-+$/.test(m[1].replace(/[|:\s]/g, "-"))) rows[m[1]] = m[2];
  });
  const t = {};
  t.kind = rows["種別"] || null;
  t.eclipse = (rows["食"] && rows["食"] !== "なし") ? rows["食"] : null;
  t.visibility = rows["食の日本からの可視性"] || null;
  t.datetime = rows["日時(JST・分単位)"] || rows["日時（JST・分単位）"] || null;
  t.signdeg = rows["起こる星座と度数"] || null;
  t.retro = (rows["逆行中の天体"] && rows["逆行中の天体"] !== "なし")
    ? rows["逆行中の天体"].split("、") : [];
  const stKey = Object.keys(rows).find(k => k.startsWith("±3日以内の留"));
  t.stations = [];
  if (stKey && rows[stKey] !== "なし") {
    const re = /(\S+?)が(逆行開始|順行再開)\((\d+月\d+日 \d+:\d+)\)/g;
    let m; while ((m = re.exec(rows[stKey]))) t.stations.push({ body: m[1], type: m[2], date: m[3] });
  }
  const aKey = Object.keys(rows).find(k => k.startsWith("同時期の主要アスペクト"));
  t.aspects = [];
  if (aKey && !/アスペクトなし/.test(rows[aKey])) {
    const re = /([^\s、]+?)と([^\s、]+?)の(コンジャンクション\(合\)|セクスタイル|スクエア|トライン|オポジション)\((\d+月\d+日 \d+:\d+)\)/g;
    let m; while ((m = re.exec(rows[aKey]))) t.aspects.push({ a: m[1], b: m[2], type: m[3], date: m[4] });
  }
  t.prev = rows["直前の対になる月相"] || null;
  t.next = rows["直後の対になる月相"] || null;
  // v1.8: 水星逆行記事の手動表(生成命令書v1.6 §1)
  t.retroStartDT = rows["逆行開始(JST・分単位)"] || rows["逆行開始（JST・分単位）"] || null;
  t.retroStartSign = rows["開始時の星座と度数"] || null;
  t.retroEndDT = rows["逆行終了(JST・分単位)"] || rows["逆行終了（JST・分単位）"] || null;
  t.retroEndSign = rows["終了時の星座と度数"] || null;
  if (t.retroStartDT && !t.kind) t.kind = "水星逆行";
  return t;
}

// v1.8: カレンダー記事用。「まとめてコピー」出力(複数イベント表)を種別行で分割してパース
function parseTables(src) {
  const blocks = [];
  let cur = [];
  src.split("\n").forEach(line => {
    if (/^\|\s*種別\s*\|/.test(line) && cur.some(l => /^\|\s*種別\s*\|/.test(l))) {
      blocks.push(cur.join("\n")); cur = [];
    }
    cur.push(line);
  });
  if (cur.length) blocks.push(cur.join("\n"));
  return blocks.map(parseTable).filter(x => x.kind && x.datetime);
}

// ---------- 記事のパース ----------
function parseArticle(src) {
  src = z2h(src);
  const art = { raw: src };
  const meta = src.match(/<!--([\s\S]*?)-->/);
  art.meta = meta ? meta[1] : null;
  if (art.meta) {
    art.metaKind = (art.meta.match(/種別[::]\s*([^\/\n]+)/) || [])[1]?.trim().replace(/\(.+\)/, "") || null;
    art.metaEclipse = (art.meta.match(/食[::]\s*([^\/\n]+)/) || [])[1]?.trim() || null;
    art.metaChars = (art.meta.match(/文字数[::][^\d\n]*([\d,]+)/) || [])[1]?.replace(/,/g, "") || null; // 8/13実走反映: 「本文実測 」等の前置き語を許容
  }
  art.title = (src.match(/note記事タイトル\s*[::]\s*(.+)/) || src.match(/タイトル\s*[::]\s*(【.+)/) || [])[1]?.trim() || null;
  const pm = src.match(/■\s*タイトル画像プロンプト\s*\n([\s\S]*?)(?=\n■|\n━|$)/) ||
             src.match(/【画像プロンプト】\s*\n([\s\S]*?)(?=\n■|\n【|$)/) ||
             src.match(/タイトル画像プロンプト\s*[::]?\s*\n?([A-Za-z][\s\S]*?)(?=\n■|\n━|$)/);
  art.prompt = pm ? pm[1].trim() : null;
  // 章分割(画像プロンプト見出しを除く■行)。字数計測から固定文言Mを除外(C-6は art.raw で判定)
  let body = src.replace(/<!--[\s\S]*?-->/, "").replace(/■\s*タイトル画像プロンプト[\s\S]*?(?=\n■|\n━|$)/, "");
  if (typeof FIXED_COPY_M !== "undefined") {
    FIXED_COPY_M.forEach(line => {
      const ls = strip(line);
      body = body.split("\n").filter(l => strip(l) !== ls).join("\n");
    });
  }
  const parts = body.split(/\n(?=■)/).filter(p => p.trim().startsWith("■"));
  art.chapters = parts.map(p => {
    const lines = p.split("\n");
    return { heading: lines[0].replace(/^■\s*/, "").trim(),
             text: lines.slice(1).join("\n"),
             chars: strip(lines.slice(1).join("\n").replace(/【固定文言M】/g, "")).length };
  });
  art.bodyChars = art.chapters.reduce((s, c) => s + c.chars, 0);
  return art;
}

// ---------- 判定 ----------
// v1.8: 本家スキャナv2.5 DICT.SEASON_WORDS(39語)+マガジン独自語の和集合。本家側の変更時は同時改訂
const SEASON_WORDS = [
  "この夏","真夏","夏バテ","夏の疲れ","残暑","猛暑","梅雨","春風","花冷え","新緑",
  "秋の夜長","紅葉","木枯らし","冬本番","年の瀬","年末","年内","年明け","年始",
  "来年","今年中","この1年","この一年","年を越","年をまた","年度末","新年度",
  "新学期","新生活","師走","正月","お盆","クリスマス","初詣","ゴールデンウィーク","連休",
  "春","夏","秋","冬",
  "春めい","夏らし","秋めい","冬の","桜","初雪","年末年始","七夕","花火大会","衣替え"];
// v1.8: 過去構文9語(本家スキャナv2.5 DICT.PAST_WORDSと同一。主語判定は検品チャット)
const PAST_WORDS = ["てきました","てきてい","てきた","これまで","先月まで","ここ数ヶ月","ここ数カ月","ここ数か月","ここ数ケ月"];
// v1.8: M-6(逆行記事の不安訴求・生成命令書v1.6)
const RETRO_FEAR = ["壊れる","壊れて","トラブルが必ず","最悪"];
const ASSERT_WORDS = ["必ず叶","絶対に叶","が起こります","起きます。"];
const FEAR_WORDS = ["危険", "凶", "災い", "不吉", "祟り"];
const ASPECT_SYN = [
  [/コンジャンクション|(?:^|[^重])合(?![唱奏体])/, "コンジャンクション(合)"],
  [/重な/, "コンジャンクション(合)"],
  [/セクスタイル/, "セクスタイル"], [/スクエア/, "スクエア"],
  [/トライン/, "トライン"], [/オポジション|向き合/, "オポジション"]];
const PLANETS = ["太陽","水星","金星","火星","木星","土星","天王星","海王星","冥王星"];
const RANGES_5 = [[150,250],[800,1200],[1200,1800],[720,1080],[200,400]];
const SIGNS = ["牡羊座","牡牛座","双子座","蟹座","獅子座","乙女座","天秤座","蠍座","射手座","山羊座","水瓶座","魚座"];
const SIGN_EN = {"牡羊座":"Aries","牡牛座":"Taurus","双子座":"Gemini","蟹座":"Cancer","獅子座":"Leo","乙女座":"Virgo","天秤座":"Libra","蠍座":"Scorpio","射手座":"Sagittarius","山羊座":"Capricorn","水瓶座":"Aquarius","魚座":"Pisces"};
const FIXED_COPY_M = [
"【マガジンのご案内】",
"この記事は、定期購読マガジン「星野ソラの月だより 〜新月の願いごと、満月の手放し〜」(月額380円)の記事です。",
"新月の願いごとの書き方、満月の振り返りと手放し。月のリズムに合わせて、毎月お届けしています。",
"単品(300円)でも読めますが、購読なら当月の記事をすべてお読みいただけます。",
"毎月の詳しい運勢は「12星座別の月間運勢」(各500円)でどうぞ。"];

function addHours48(dt) {
  const m = dt.match(/(\d+)年(\d+)月(\d+)日 (\d+):(\d+)/);
  if (!m) return null;
  const d = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5]);
  d.setHours(d.getHours() + 48);
  return { md: `${d.getMonth()+1}月${d.getDate()}日`,
           hm: `${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}` };
}

function scan(t, art) {
  const R = { A: [], B: [], C: [], D: [], E: [], F: [] };
  const push = (sec, id, ok, msg) => R[sec].push({ id, ok, msg }); // ok: true/false/"warn"
  const raw = z2h(art.raw);
  const normRaw = raw.replace(/(\d+)時(\d+)分/g, "$1:$2");
  const isRetro = /水星逆行/.test(t.kind || "") || /水星逆行/.test(art.metaKind || "") || /水星逆行/.test(art.title || "");
  const isCal = !!t.events;
  const nrStrip = strip(normRaw);
  const dtHit = v => { if (!v) return false;
    const a = strip(v.replace(/^\d+年/,"")), b = strip(v);
    return nrStrip.includes(a) || nrStrip.includes(b); }; // v1.8修正: 空白の有無に依存しない照合
  const sdHit = v => { if(!v) return false; const sd = v.replace(/\(.+\)/, "").trim().replace(/\s+/g, ""); return strip(normRaw).includes(sd); };

  // ===== A. 天文照合 =====
  if (isCal) {
    // v1.8: カレンダー記事=全イベントを照合
    t.events.forEach((ev, i) => {
      const n = i + 1;
      push("A", `A-1 イベント${n}`, dtHit(ev.datetime), `日時 表:${ev.datetime}` + (dtHit(ev.datetime) ? "" : " → 記事内に一致なし"));
      if (ev.signdeg) push("A", `A-2 イベント${n}`, sdHit(ev.signdeg), `星座度数 表:${ev.signdeg}` + (sdHit(ev.signdeg) ? "" : " → 記事内に一致なし"));
      if (ev.eclipse) push("A", `A-3 イベント${n}`, raw.includes(ev.eclipse), `食 表:${ev.eclipse}` + (raw.includes(ev.eclipse) ? "" : " → 記事に種別名の明示なし(§2-C: 食は種別併記)"));
    });
  } else if (isRetro) {
    // v1.8: 逆行記事=開始・終了の両方を照合(検品A-1/A-2)
    if (!t.retroStartDT || !t.retroEndDT) push("A","A-1",false,"逆行表に開始・終了の日時がそろっていない(生成§1の手動表を確認)");
    else {
      push("A","A-1 開始", dtHit(t.retroStartDT), `逆行開始 表:${t.retroStartDT}` + (dtHit(t.retroStartDT) ? "" : " → 記事内に一致なし"));
      push("A","A-1 終了", dtHit(t.retroEndDT), `逆行終了 表:${t.retroEndDT}` + (dtHit(t.retroEndDT) ? "" : " → 記事内に一致なし"));
    }
    if (t.retroStartSign) push("A","A-2 開始", sdHit(t.retroStartSign), `開始時 表:${t.retroStartSign}` + (sdHit(t.retroStartSign) ? "" : " → 記事内に一致なし"));
    if (t.retroEndSign) push("A","A-2 終了", sdHit(t.retroEndSign), `終了時 表:${t.retroEndSign}` + (sdHit(t.retroEndSign) ? "" : " → 記事内に一致なし"));
    { // v1.8修正: 期間長を算出して参考表示(検品A-7の期間検算の転記元。判定には使わない)
      const pd = s => { const m = String(s).match(/(\d+)年(\d+)月(\d+)日/); return m ? new Date(+m[1], +m[2]-1, +m[3]) : null; };
      const d1 = pd(t.retroStartDT), d2 = pd(t.retroEndDT);
      if (d1 && d2) { const days = Math.round((d2 - d1) / 86400000);
        push("A","A-7", true, `参考: 逆行期間 ${days}日間(約${Math.round(days/7)}週間)。記事に期間の言及があれば検品A-7でこの値と突き合わせる`); }
    }
  } else {
  if (!t.datetime) { push("A","A-1",false,"表に日時がない(表の貼り付けを確認)"); }
  else {
    push("A","A-1", dtHit(t.datetime),
      `日時 表:${t.datetime}` + (dtHit(t.datetime) ? "" : " → 記事内に一致なし")); // v1.8修正: 空白非依存
  }
  if (t.signdeg) {
    const sd = t.signdeg.replace(/\(.+\)/, "").trim().replace(/\s+/g, "");
    push("A","A-2", strip(normRaw).includes(sd), `星座度数 表:${sd}` + (strip(normRaw).includes(sd) ? "" : " → 記事内に一致なし"));
  }
  }
  const eclWords = raw.match(/(皆既|金環|部分|半影)?(日食|月食)/g) || [];
  if (isCal) { /* v1.8: カレンダーはイベント別にA-3判定済み */ }
  else if (!t.eclipse) {
    push("A","A-3", eclWords.length ? "warn" : true,
      eclWords.length ? `表は食なしだが記事に食の語(${[...new Set(eclWords)].join("、")})。次月相への言及なら可、文脈確認` : "食なし・記事にも食の記述なし");
  } else {
    push("A","A-3", raw.includes(t.eclipse), `食 表:${t.eclipse}` + (raw.includes(t.eclipse) ? "" : " → 記事に種別名の明示なし"));
  }
  // A-4 アスペクト
  const sentences = raw.split(/[。\n]/);
  let aspIssues = [], aspFound = 0;
  sentences.forEach(s => {
    ASPECT_SYN.forEach(([re, type]) => {
      if (re.test(s)) {
        const pl = PLANETS.filter(p => s.includes(p));
        if (pl.length >= 2) {
          aspFound++;
          const hit = t.aspects.some(a => pl.includes(a.a) && pl.includes(a.b) && a.type === type);
          if (!hit) aspIssues.push(`「${s.trim().slice(0,40)}…」(${pl.join("・")}の${type})が表に見つからない`);
        }
      }
    });
  });
  push("A","A-4", aspIssues.length ? false : true,
    aspIssues.length ? aspIssues.join(" / ") : `アスペクト言及${aspFound}件、すべて表と一致(または言及なし)`);
  // A-5 逆行・留
  let retroIssues = [];
  PLANETS.forEach(p => {
    if (isRetro && p === "水星") return; // v1.8: 逆行記事の主役は表の開始・終了で照合済み(検品A-5)
    const re = new RegExp(p + "[^。]{0,12}逆行|逆行[^。]{0,8}" + p);
    if (re.test(raw) && !t.retro.includes(p) && !t.stations.some(s => s.body === p))
      retroIssues.push(`${p}の逆行に言及しているが表の逆行欄・留欄にない`);
  });
  push("A","A-5", retroIssues.length ? false : true, retroIssues.length ? retroIssues.join(" / ") : "逆行・留の言及は表と整合(または言及なし)");
  // A-6/A-7/A-8 日付・時刻・度数の照合
  const allowedMD = new Set(), allowedHM = new Set(), allowedDeg = new Set();
  const addDT = s => { if (!s) return;
    (s.match(/\d+月\d+日/g) || []).forEach(x => allowedMD.add(x));
    (s.match(/\d+:\d+/g) || []).forEach(x => allowedHM.add(normHM(x))); };
  addDT(t.datetime); addDT(t.prev); addDT(t.next);
  addDT(t.retroStartDT); addDT(t.retroEndDT); // v1.8
  if (isCal) t.events.forEach(ev => { addDT(ev.datetime); addDT(ev.prev); addDT(ev.next);
    ev.aspects.forEach(a => addDT(a.date)); ev.stations.forEach(s => addDT(s.date)); }); // v1.8
  t.aspects.forEach(a => addDT(a.date)); t.stations.forEach(s => addDT(s.date));
  const h48 = (!isRetro && !isCal && t.datetime) ? addHours48(t.datetime) : null; // v1.8: 48時間導出は月相記事のみ
  if (h48) { allowedMD.add(h48.md); allowedHM.add(normHM(h48.hm)); }
  [t.signdeg, t.prev, t.next, t.retroStartSign, t.retroEndSign].forEach(s => (String(s).match(/\d+度(\d+分)?/g) || []).forEach(d => allowedDeg.add(d)));
  if (isCal) t.events.forEach(ev => [ev.signdeg, ev.prev, ev.next].forEach(s => (String(s).match(/\d+度(\d+分)?/g) || []).forEach(d => allowedDeg.add(d)))); // v1.8
  const badMD = [...new Set((normRaw.match(/\d+月\d+日/g) || []))].filter(x => !allowedMD.has(x));
  const badHM = [...new Set((normRaw.match(/\d+:\d+/g) || []).map(normHM))].filter(x => !allowedHM.has(x));
  const badDeg = [...new Set((normRaw.match(/\d+度\d+分|\d+度(?![\d分])/g) || []))].filter(x => !allowedDeg.has(x));
  const permText = h48 ? "表+48時間期限" : "表"; // v1.8修正: 48時間導出は月相記事のみのため文言を実態に合わせる
  push("A","A-6/7", (badMD.length || badHM.length) ? false : true,
    (badMD.length || badHM.length)
      ? `表から導出できない日付・時刻: ${[...badMD, ...badHM].join("、")}(${permText}の許容集合と不一致)`
      : `記事内の全日付・時刻が${permText}の許容集合内`);
  // 7/29実走反映(同日訂正): 値は表と同じだが表記が違う(桁の増減)=表記不一致・要修正。生成§1「表のまま転記」
  const normDeg = x => { const m = x.match(/^(\d+)度(?:(\d+)分)?$/); return m ? (+m[1]) + "度" + (m[2] ? (+m[2]) + "分" : "") : x; };
  const allowedNorm = new Set([...allowedDeg].map(normDeg));
  const mismatchDeg = badDeg.filter(x => allowedNorm.has(normDeg(x)));
  const otherDeg = badDeg.filter(x => !mismatchDeg.includes(x));
  if (mismatchDeg.length) push("A","A-8", false, `度数の表記が表と不一致: ${mismatchDeg.join("、")} → 表の表記のまま転記へ修正(生成§1)`);
  push("A","A-8" + (mismatchDeg.length ? "b" : ""), otherDeg.length ? "warn" : true,
    otherDeg.length ? `表にない度数表記: ${otherDeg.join("、")}(導出可能か文脈確認)` : "度数の捏造なし(表記不一致を除く)");

  // ===== B. 字数・構成 =====
  const isCalendar = isCal || /カレンダー/.test(art.metaKind || "") || /カレンダー/.test(art.title || "");
  const needCh = isCalendar ? 3 : 5;
  push("B","B-1/B-6", art.chapters.length === needCh,
    `章数 ${art.chapters.length}/${needCh}` + (art.chapters.length < needCh ? "(不足・途中切れの可能性)" : art.chapters.length > needCh ? "(過剰)" : ""));
  if (!isCalendar) {
    art.chapters.slice(0, 5).forEach((c, i) => {
      if (!RANGES_5[i]) return;
      const [lo, hi] = RANGES_5[i];
      push("B", `B-2 第${i+1}章`, c.chars >= lo && c.chars <= hi, `${c.chars}字(規定${lo}〜${hi})`);
    });
    const [tlo, thi] = [3500, 5000];
    push("B","B-3", art.bodyChars >= tlo && art.bodyChars <= thi, `合計実測${art.bodyChars}字(規定${tlo}〜${thi})`);
  } else {
    push("B","B-3", art.bodyChars >= 2000 && art.bodyChars <= 3000, `合計実測${art.bodyChars}字(規定2,000〜3,000)`);
  }
  if (art.metaChars) {
    const claim = +art.metaChars, real = art.bodyChars;
    const dev = real ? Math.abs(claim - real) / real * 100 : 999;
    push("B","B-4", dev <= 10, `メタ申告${claim}字 / 実測${real}字 / 乖離${dev.toFixed(1)}%`);
  } else push("B","B-4", false, "メタブロックに文字数申告がない");
  if (!isCalendar && art.chapters[3]) {
    const ch4 = art.chapters[3].text;
    const missing = SIGNS.filter(s => !ch4.includes(s));
    let sizeBad = [];
    const idx = SIGNS.map(s => ({ s, i: ch4.indexOf(s) }))
      .filter(o => o.i >= 0).sort((a, b) => a.i - b.i);
    idx.forEach((o, k) => {
      const end = k + 1 < idx.length ? idx[k+1].i : ch4.length;
      let seg = ch4.slice(o.i, end);
      // 星座区間の末尾にある章の締め文(全星座への一文)は最後の星座に混ざるので緩衝: 段落区切り以降を除外
      if (k === idx.length - 1) seg = seg.split(/\n\s*\n/)[0];
      const n = strip(seg).length;
      if (n < 60 || n > 90) sizeBad.push(`${o.s}${n}字`);
    });
    push("B","B-5", (missing.length || sizeBad.length) ? false : true,
      missing.length ? `欠落星座: ${missing.join("、")}` :
      sizeBad.length ? `規定(60〜90字)外: ${sizeBad.join("、")}` : "12星座すべて60〜90字");
  }

  // ===== C. 形式 =====
  push("C","C-1", !!(art.meta && art.metaKind && art.metaChars),
    !art.meta ? "メタブロックなし" :
    (art.metaKind && art.metaChars) ? "メタブロックあり(必須項目そろい)" :
    "メタブロックはあるが必須項目(種別/文字数)が読み取れない");
  if (art.title) {
    let ok = false, msg = "";
    if (isRetro) { // v1.8: 逆行記事の命名規則(生成§7)
      const rm = art.title.match(/^【(\d+\/\d+)〜(\d+\/\d+)\s*水星逆行】(.+)$/);
      if (!rm) msg = `命名規則不一致(逆行形式【M/D〜M/D 水星逆行】): ${art.title}`;
      else {
        const benefit = rm[3].trim();
        if (strip(benefit).length > 20) msg = `ベネフィット文${strip(benefit).length}字(20字以内)`;
        else { ok = true; msg = `${art.title}(ベネフィット${strip(benefit).length}字)`; }
      }
    } else if (isCalendar) { // v1.8: カレンダー記事の命名規則(生成§7)
      const cm = art.title.match(/^【(\d+)月の月カレンダー】(.+)$/);
      if (!cm) msg = `命名規則不一致(【M月の月カレンダー】形式): ${art.title}`;
      else { ok = true; msg = art.title + (cm[2].trim() === "新月・満月と今月のテーマ" ? "(基本形どおり)" : "(基本形と異なる後半・文脈確認)"); }
    } else {
    const tm = art.title.match(/^【(\d+\/\d+)\s*(.+?)(新月|満月)(・(皆既|金環|部分|半影)?(日食|月食))?】(.+)$/);
    ok = !!tm;
    if (!tm) msg = `命名規則不一致: ${art.title}`;
    else {
      const benefit = tm[7].trim();
      if (strip(benefit).length > 20) { ok = false; msg = `ベネフィット文${strip(benefit).length}字(20字以内)`; }
      else if (t.eclipse && !tm[4]) { ok = false; msg = "食なのにタイトルに食種別がない"; }
      else msg = `${art.title}(ベネフィット${strip(benefit).length}字)`;
    }
    }
    push("C","C-2", ok, msg);
  } else push("C","C-2", false, "タイトル行が見つからない");
  if (art.prompt) {
    const p = art.prompt;
    push("C","C-3", /watercolor art style/i.test(p) && /8k/i.test(p),
      `watercolor:${/watercolor art style/i.test(p)?"○":"×"} / 8k:${/8k/i.test(p)?"○":"×"}`);
    const neg = p.match(/\bno\s+\w+|\bwithout\s+\w+|\bnot\s+\w+/gi);
    push("C","C-4", neg ? false : true, neg ? `否定形表現: ${neg.join(", ")}` : "否定形なし");
    if (isRetro) { // v1.8: 逆行記事=水星が主題(生成§6・検品C-5)
      push("C","C-5", /mercury/i.test(p), "水星(Mercury)" + (/mercury/i.test(p) ? " をプロンプトに含む" : " がプロンプトにない"));
    } else if (isCalendar) { // v1.8: カレンダー=月の満ち欠け(生成§6)
      push("C","C-5", /phases of the moon|moon phases/i.test(p) ? true : "warn",
        /phases of the moon|moon phases/i.test(p) ? "phases of the moon をプロンプトに含む" : "phases of the moon がプロンプトにない(生成§6の主題指定を確認)");
    } else {
    const sign = t.signdeg ? SIGNS.find(s => t.signdeg.includes(s)) : null;
    if (sign) push("C","C-5", new RegExp(SIGN_EN[sign], "i").test(p),
      `${sign}(${SIGN_EN[sign]})` + (new RegExp(SIGN_EN[sign],"i").test(p) ? " をプロンプトに含む" : " がプロンプトにない"));
    }
  } else { push("C","C-3", false, "画像プロンプトが見つからない"); }
  // C-6: 固定文言Mの完全一致(生成命令書v1.5 §8「一字一句このまま」)
  if (raw.includes("【固定文言M】")) {
    push("C","C-6", false, "プレースホルダ【固定文言M】のまま(v1.5以降は確定版を一字一句掲載)");
  } else {
    const rawN = strip(raw);
    const missing = FIXED_COPY_M.filter(line => !rawN.includes(strip(line)));
    if (missing.length === 0) push("C","C-6", true, "固定文言M 確定版と一字一句一致");
    else if (missing.length === FIXED_COPY_M.length) push("C","C-6", false, "固定文言Mがない");
    else push("C","C-6", false, `固定文言Mに規定と不一致の行あり: 「${missing[0].slice(0,30)}…」が見つからない(誤記・改変の疑い)`);
  }
  push("C","C-7", art.chapters.length > 0 && art.chapters.every(c => c.heading.length > 0), "■見出し形式");

  // ===== D〜F. 注意検出(語彙ベース) =====
  // v1.8: D-1 過去構文9語(A-5(a)の機械化・主語判定は検品チャット)
  const ch4 = art.chapters.find(c => /12星座|ワンポイント/.test(c.heading));
  const ch4start = ch4 ? raw.indexOf("■ " + ch4.heading) : -1;
  const ch4end = ch4start >= 0 ? (raw.indexOf("\n■", ch4start + 1) === -1 ? raw.length : raw.indexOf("\n■", ch4start + 1)) : -1;
  PAST_WORDS.forEach(w => {
    let i = 0;
    while ((i = raw.indexOf(w, i)) !== -1) {
      const a = Math.max(0, i - 14);
      const inCh4 = ch4start >= 0 && i > ch4start && i < ch4end;
      // 7/29実走反映: 第4章は主語を問わず9語禁止(生成2-Aの現在形規定)=機械判定✗。他章は従来どおり主語判定へ
      push("D","D-1", inCh4 ? false : "warn",
        (inCh4 ? "✗第4章の過去構文(現在形規定違反): " : "過去構文の可能性: ") + `「${w}」…${raw.slice(a, i + w.length + 10).replace(/\n/g," ")}…` + (inCh4 ? " → 現在形へ(例: 合わせてきた→合わせがちな)" : "(主語が読者なら違反)"));
      i += w.length;
    }
  });
  SEASON_WORDS.forEach(w => { if (raw.includes(w)) push("D","D-2","warn",`季節語の可能性: 「${w}」`); });
  ASSERT_WORDS.forEach(w => { if (raw.includes(w)) push("D","D-5","warn",`断定表現の可能性: 「${w}」`); });
  if (t.eclipse) FEAR_WORDS.forEach(w => { if (raw.includes(w)) push("E","E-3","warn",`恐怖訴求の可能性: 「${w}」`); });
  if (isRetro) { // v1.8: D-9 M-6不安訴求(逆行記事のみ・生成命令書v1.6)
    FEAR_WORDS.concat(RETRO_FEAR).forEach(w => { if (raw.includes(w)) push("D","D-9","warn",`M-6 不安訴求の可能性: 「${w}」`); });
  }
  if (t.eclipse && t.visibility) {
    const promotes = /見上げ|観測しま|空を眺め/.test(raw);
    if (promotes && /見えない/.test(t.visibility) && !/見える/.test(t.visibility))
      push("E","E-5", false, "可視性が「見えない」なのに観測を促す表現がある");
    else if (promotes && /国内に(皆既|金環)食が見える地域あり/.test(t.visibility))
      push("E","E-5","warn","国内一部可視の食で観測表現あり。地域差の併記を文脈確認");
  }
  // F-1 逆行整合
  const ch2text = art.chapters[1] ? art.chapters[1].text : "";
  t.retro.forEach(p => {
    if (ch2text.includes(p) && !raw.includes("逆行"))
      push("F","F-1","warn",`${p}は逆行中(表)だが記事に逆行への言及がない。テーマに使う場合は整合確認`);
  });
  if (R.D.length === 0) push("D","D","warn0","語彙検出での指摘なし(文脈判定は検品AI/人間が実施)");
  if (R.E.length === 0 && t.eclipse) push("E","E","warn0","語彙検出での指摘なし(文脈判定は検品AI/人間が実施)");
  if (R.F.length === 0) push("F","F","warn0","指摘なし");
  return R;
}

// ---------- レポート描画 ----------
function render(R) {
  const secNames = { A: "A. 天文照合", B: "B. 字数・構成", C: "C. 形式",
                     D: "D. 禁止事項(注意検出)", E: "E. 食・可視性(注意検出)", F: "F. 整合性(注意検出)" };
  let anyFail = false, anyWarn = false, textLines = [];
  const box = $("sections"); box.innerHTML = "";
  Object.keys(secNames).forEach(k => {
    if (!R[k].length) return;
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<h2>${secNames[k]}</h2>`;
    textLines.push(`■ ${secNames[k]}`);
    R[k].forEach(it => {
      const mark = it.ok === true ? "○" : it.ok === false ? "×" : "⚠";
      const cls = it.ok === true ? "ok" : it.ok === false ? "ng" : "wa";
      if (it.ok === false) anyFail = true;
      if (it.ok === "warn") anyWarn = true;
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `<span class="mark ${cls}">${mark}</span>${it.id === "D" || it.id === "E" || it.id === "F" ? "" : it.id + " "}${esc(it.msg)}`;
      sec.appendChild(div);
      textLines.push(`${mark} ${it.id} ${it.msg}`);
    });
    box.appendChild(sec);
    textLines.push("");
  });
  const v = $("verdict");
  let verdict;
  if (anyFail) { verdict = "差し戻し"; v.className = "verdict fail"; }
  else if (anyWarn) { verdict = "条件付き合格(注意項目の文脈判定へ)"; v.className = "verdict cond"; }
  else { verdict = "機械判定 全項目クリア(D〜Fの文脈判定へ)"; v.className = "verdict pass"; }
  v.textContent = "【検品結果】" + verdict;
  textLines.unshift(`【検品結果】${verdict}`, "");
  $("report").style.display = "block";
  return textLines.join("\n");
}

function cfgFp(t){ let h = 0; for(let i = 0; i < t.length; i++){ h = ((h << 5) - h + t.charCodeAt(i)) | 0; } return h; } // 保管庫群と同一の指紋方式
function copyText(text, btn, idleLabel) {
  try{ localStorage.setItem("nightsky-last-copy-fp", String(cfgFp(text))); }catch(e){} // 自分のコピーは自動取り込みの対象外にする(ツール群共通の作法)
  const done = () => {
    btn.classList.add("done");
    btn.textContent = "コピーしました";
    setTimeout(() => { btn.classList.remove("done"); btn.textContent = idleLabel; }, 1800);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback());
  } else fallback();
  function fallback() {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function splitForSubmission(src) {
  const s = z2h(src);
  const title = (s.match(/note記事タイトル\s*[::]\s*(.+)/) || s.match(/タイトル\s*[::]\s*(【.+)/) || [])[1]?.trim() || null;
  const pm = s.match(/■\s*タイトル画像プロンプト\s*\n([\s\S]*?)(?=\n■|\n━|$)/) ||
             s.match(/タイトル画像プロンプト\s*[::]?\s*\n?([A-Za-z][\s\S]*?)(?=\n■|\n━|$)/);
  const prompt = pm ? pm[1].trim() : null;
  // 本文 = 全文 − メタブロック − 画像プロンプトブロック − タイトル行 − 罫線行
  let body = src
    .replace(/<!--[\s\S]*?-->\s*/, "")
    .replace(/■\s*タイトル画像プロンプト[\s\S]*?(?=\n■|\n━|$)/, "")
    .replace(/^タイトル画像プロンプト\s*[::]?\s*\n+[A-Za-z][\s\S]*?(?=\n■|\n━|$)/m, "")
    .replace(/^.*note記事タイトル\s*[::].*$/m, "")
    .replace(/^\s*タイトル\s*[::]\s*【.*$/m, "")
    .replace(/^━+$/gm, "")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
  // 有料ライン位置(生成命令書v1.5 §7: 第2章の最初の段落の直後)
  let paidLine = null;
  const ch2 = body.match(/■\s*2[..]?[^\n]*\n([\s\S]*?)(?=\n■|$)/);
  if (ch2) {
    const firstPara = ch2[1].trim().split(/\n\s*\n/)[0].split("\n")[0].trim();
    if (firstPara) paidLine = firstPara.slice(-24);
  }
  return { title, prompt, body, paidLine };
}

function partCard(label, content, note) {
  const div = document.createElement("div");
  div.className = "part";
  const pre = document.createElement("pre");
  pre.textContent = content.length > 400 ? content.slice(0, 400) + "…" : content;
  div.innerHTML = `<h3>${label}</h3>`;
  div.appendChild(pre);
  if (note) {
    const m = document.createElement("div");
    m.className = "meta-line"; m.textContent = note;
    div.appendChild(m);
  }
  const btn = document.createElement("button");
  btn.textContent = "コピー";
  btn.addEventListener("click", () => copyText(content, btn, "コピー"));
  div.appendChild(btn);
  return div;
}

$("splitBtn").addEventListener("click", () => {
  const aSrc = $("articleIn").value.trim();
  if (!aSrc) { alert("②に記事全文を貼ってください(分割は表なしで動きます)"); return; }
  const { title, prompt, body, paidLine } = splitForSubmission(aSrc);
  const out = $("splitOut");
  out.innerHTML = "";
  out.appendChild(partCard("note記事タイトル", title || "(見つからない)", null));
  out.appendChild(partCard("タイトル画像プロンプト", prompt || "(見つからない)",
    prompt ? "Gemini等の画像生成に貼る" : null));
  out.appendChild(partCard("本文(note入稿用)", body || "(空)",
    body ? `${body.replace(/[\s\u3000]/g, "").length}字(固定文言M込み・見出し込み) ・ メタ/タイトル行/プロンプトは除去済み` +
      (paidLine ? `\n有料ラインの位置: 「…${paidLine}」の直後(第2章の最初の段落の後・§7)` : "") : null));
  out.style.display = "block";
  if (out.scrollIntoView) out.scrollIntoView({ behavior: "smooth" });
});

let lastReport = "";
$("runBtn").addEventListener("click", () => {
  fillTableFromShared(); // 同日追加: ①が空なら共有保存領域から自動補完
  const tSrc = $("tableIn").value.trim(), aSrc = $("articleIn").value.trim();
  if (!tSrc || !aSrc) {
    alert("入力不備: ジェネレーター表と記事全文の2点セットが必須です(検品命令書§1)");
    return;
  }
  let t;
  // v1.8修正: カレンダー判定はメタ種別またはタイトルの明示のみ(本文中の「カレンダー」の語では誤発動しない)
  const calMeta = (aSrc.match(/種別[::]\s*([^\/\n]+)/) || ["",""])[1];
  const isCalArticle = /カレンダー/.test(calMeta) || /【\d+月の月カレンダー】/.test(z2h(aSrc));
  if (isCalArticle) {
    // v1.8: カレンダー記事対応(生成§10の未対応を解消)。①には「まとめてコピー」の当月全イベント表を貼る
    const events = parseTables(tSrc);
    if (!events.length) {
      alert("表のパースに失敗しました。カレンダー記事は①にジェネレーターの「この月の新月・満月をまとめてコピー」の出力を貼ってください(検品命令書§1)");
      return;
    }
    t = { kind: "カレンダー", events,
          eclipse: null, visibility: null, datetime: null, signdeg: null,
          retro: [...new Set(events.flatMap(e => e.retro))],
          stations: events.flatMap(e => e.stations),
          aspects: events.flatMap(e => e.aspects),
          prev: null, next: null,
          retroStartDT: null, retroStartSign: null, retroEndDT: null, retroEndSign: null };
  } else {
    t = parseTable(tSrc);
    if (!t.kind || (!t.datetime && !t.retroStartDT)) {
      alert("表のパースに失敗しました。月相記事はジェネレーターv1.4の「Markdownをコピー」、水星逆行記事は生成命令書v1.6 §1の手動表をそのまま貼ってください");
      return;
    }
  }
  lastReport = render(scan(t, parseArticle(aSrc)));
  if ($("report").scrollIntoView) $("report").scrollIntoView({ behavior: "smooth" });
});

$("copyReport").addEventListener("click", e => {
  const btn = e.currentTarget;
  const done = () => { btn.classList.add("done"); btn.textContent = "コピーしました";
    setTimeout(() => { btn.classList.remove("done"); btn.textContent = "検品レポートをコピー"; }, 1800); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastReport).then(done).catch(() => {});
  } else {
    const ta = document.createElement("textarea");
    ta.value = lastReport; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); done(); } catch(err) {}
    document.body.removeChild(ta);
  }
});

/* ---- クリップボード自動取り込み(v1.8同日追加) ----
   ジェネレーターv1.4で「Markdownをコピー」→ このページを開く(戻る)だけで①に表が入る。
   記事(note記事タイトル行やメタ付き)をコピーしていれば②に入る。
   記事保管庫と同じ方式: 空欄にのみ入れる・同じ内容は一度だけ・自分のコピー(指紋一致)は無視。
   iPhoneでは初回に「ペースト」の許可バブルが出ることがある(タップで許可)。 */
let lastAutoFp = null;
function miniToast(msg){
  let el = document.getElementById("autoToast");
  if(!el){
    el = document.createElement("div");
    el.id = "autoToast";
    el.style.cssText = "position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#20304e;color:#edf0f8;border:1px solid #3c4c80;border-radius:999px;padding:10px 18px;font-size:13px;z-index:50;max-width:90vw;transition:opacity .3s";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity = "0"; }, 2200);
}
function classifyClip(x){
  if(/\|\s*種別\s*\|/.test(x) || /\|\s*逆行開始/.test(x)) return "table";
  if(/note記事タイトル\s*[::]/.test(x) || /^<!--\s*種別/m.test(x)) return "article";
  return null;
}
async function autoIngest(){
  const ae = document.activeElement && document.activeElement.tagName;
  if(ae === "TEXTAREA" || ae === "INPUT") return; // 入力中は邪魔しない(記事保管庫と同じ)
  let x; try{ x = await navigator.clipboard.readText(); }catch(e){ return; }
  if(!x || !x.trim()) return;
  const fp = cfgFp(x);
  if(lastAutoFp === fp) return;
  try{ if(localStorage.getItem("nightsky-last-copy-fp") === String(fp)) return; }catch(e){}
  const kind = classifyClip(x);
  if(!kind) return;
  const box = $(kind === "table" ? "tableIn" : "articleIn");
  if(box.value.trim()) return; // 空欄にのみ自動で入れる(手入力を上書きしない)
  box.value = x;
  lastAutoFp = fp;
  miniToast(kind === "table" ? "① にコピー中の表を自動で入れました" : "② にコピー中の記事を自動で入れました");
}
/* ---- 共有保存領域からの完全自動取り込み(ジェネレーターv1.5連携・同日追加) ----
   ジェネレーターv1.5で該当月を一度でも表示していれば、②の記事のタイトル
   (【M/D 〜新月/満月】・【M月の月カレンダー】)から該当の表を探して①へ自動で入れる。
   コピーボタンすら不要。同じ場所(サイト)に置いたツール同士でのみ働く。 */
let lastGenCopiedFp = null;
function fillTableFromShared(){
  if ($("tableIn").value.trim()) return false;
  // 1) ジェネレーターで最後にコピーされた表(明示の選択を最優先)
  try {
    const gc = JSON.parse(localStorage.getItem("nightsky-gen-copied") || "null");
    if (gc && gc.md && lastGenCopiedFp !== gc.fp && classifyClip(gc.md) === "table") {
      $("tableIn").value = gc.md; lastGenCopiedFp = gc.fp;
      miniToast("① にジェネレーターでコピーした表を自動で入れました");
      return true;
    }
  } catch (e) {}
  // 2) 記事のタイトルから該当月・該当イベントを照合(コピー不要の完全自動)
  let feed; try { feed = JSON.parse(localStorage.getItem("nightsky-gen-feed") || "null"); } catch (e) { return false; }
  if (!feed || !feed.months) return false;
  const a = z2h($("articleIn").value);
  if (!a.trim()) return false;
  const ym = a.match(/(\d{4})年(\d{1,2})月/);
  const m1 = a.match(/【(\d{1,2})\/(\d{1,2})\s*[^】]*?(新月|満月)/);
  let md = null, label = "";
  if (m1) {
    const mo = +m1[1], dy = +m1[2], kind = m1[3];
    for (const [k, v] of Object.entries(feed.months)) {
      if (+k.slice(5) !== mo) continue;
      if (ym && +k.slice(0, 4) !== +ym[1]) continue;
      const ev = (v.events || []).find(e => e.kind === kind && e.day === dy);
      if (ev) { md = ev.md; label = k + " " + kind; }
    }
  } else {
    const mc = a.match(/【(\d{1,2})月の月カレンダー】/);
    if (mc) {
      for (const [k, v] of Object.entries(feed.months)) {
        if (+k.slice(5) !== +mc[1]) continue;
        if (ym && +k.slice(0, 4) !== +ym[1]) continue;
        md = v.all_md; label = k + " まとめ";
      }
    }
  }
  if (!md) return false;
  $("tableIn").value = md;
  miniToast("① に該当月の表を自動で入れました(" + label + ")");
  return true;
}
const _autoIngestBase = autoIngest;
autoIngest = async function(){
  await _autoIngestBase();
  fillTableFromShared();
};
window.addEventListener("focus", autoIngest);
autoIngest();
</script>
