<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記事保管庫">
<meta name="theme-color" content="#101226">
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" href="./icon.png">
<title>記事保管庫</title>
<style>
  :root{
    --night:#101226;
    --night-2:#181b36;
    --card:#1e2244;
    --card-edge:#2c3160;
    --gold:#d9b96a;
    --gold-dim:#a68b4a;
    --ink:#f0ede2;
    --ink-dim:#9a9cc0;
    --danger:#c96a6a;
    --ok:#7ec9a2;
    --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP",serif;
    --sans:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, #232a5a 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 100%, #1a1f45 0%, transparent 55%),
      var(--night);
    color:var(--ink);
    font-family:var(--sans);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.35;animation:tw 4s ease-in-out infinite}
  @keyframes tw{50%{opacity:.08}}
  @media (prefers-reduced-motion:reduce){.stars i{animation:none}}

  .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:calc(20px + env(safe-area-inset-top)) 16px 60px}

  header{padding:14px 2px 22px;display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  h1{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.14em;color:var(--ink)}
  h1 small{display:block;font-size:11px;letter-spacing:.3em;color:var(--gold);margin-top:6px;font-family:var(--sans)}
  .month-tag{font-size:12px;color:var(--ink-dim);border:1px solid var(--card-edge);border-radius:999px;padding:5px 12px;background:var(--night-2);cursor:pointer}
  .month-tag b{color:var(--gold);font-weight:600}
  .month-nav{display:flex;align-items:center;gap:6px}
  .mn-btn{
    background:var(--night-2);border:1px solid var(--card-edge);color:var(--ink);
    border-radius:10px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:var(--sans);
  }
  .mn-btn:active{background:var(--card)}
  .pick-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:20px 0 8px}
  .pick-num{
    width:120px;font-size:34px;font-weight:600;text-align:center;
    background:var(--night-2);border:1px solid var(--card-edge);border-radius:14px;
    color:var(--ink);padding:16px 8px;font-family:var(--sans);
  }
  .pick-num:focus{outline:2px solid var(--gold);outline-offset:1px}
  .pick-unit{font-size:18px;color:var(--ink-dim);font-family:var(--serif)}
  .pick-sel{
    flex:1;max-width:180px;font-size:16px;padding:13px 12px;
    background:var(--night-2);border:1px solid var(--card-edge);border-radius:12px;
    color:var(--ink);font-family:var(--sans);
  }

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media (max-width:480px){ .grid{grid-template-columns:repeat(2,1fr);gap:12px} }
  .sign-card{
    position:relative;
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    padding:12px 10px 10px;
    text-align:center;
    transition:border-color .12s ease;
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .sc-main{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    width:100%;cursor:pointer;padding:2px 0 6px;border:none;background:transparent;
    font-family:var(--sans);color:var(--ink);
  }
  .sc-main:active{opacity:.7}
  .sc-actions{display:flex;gap:8px;width:100%}
  .sc-act{
    flex:1;padding:11px 0;font-size:12px;border-radius:9px;cursor:pointer;
    font-family:var(--sans);letter-spacing:.05em;
    background:var(--night-2);border:1px solid var(--card-edge);color:var(--ink);
  }
  .sc-act:active{background:var(--night)}
  .sc-act.paste{color:var(--gold);border-color:var(--gold-dim)}
  .sc-act .cc{color:var(--ok);font-weight:600;margin-left:4px}
  .sign-card .vf{font-size:9px;letter-spacing:.03em}
  .sign-card .vf.ok{color:var(--ok)}
  .sign-card .vf.warn{color:#e2a25a;font-weight:600}
  .sign-card.mismatch{border-color:#8a5a3a}
  .sign-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .sign-card .sym{font-size:24px;line-height:1;color:#ffffff}
  .sign-card .nm{font-family:var(--serif);font-size:13px;letter-spacing:.12em;color:#ffffff}
  .sign-card .st{font-size:10px;color:var(--ink-dim);letter-spacing:.05em}
  .sign-card.filled{border-color:var(--gold-dim)}
  .sign-card.filled .sym{color:var(--gold)}
  .sign-card.filled::after{
    content:"";position:absolute;top:8px;right:9px;width:6px;height:6px;border-radius:50%;
    background:var(--gold);box-shadow:0 0 8px var(--gold);
  }
  /* コピー済み(1回以上)は右上の点が緑に変わる */
  .sign-card.copied::after{
    background:var(--ok);box-shadow:0 0 8px var(--ok);
  }
  .sign-card.filled .st{color:var(--ok)}

  .section-label{margin:26px 0 10px;font-size:11px;letter-spacing:.28em;color:var(--ink-dim)}
  .extra-list{display:flex;flex-direction:column;gap:8px}
  .extra-item{
    background:var(--card);border:1px solid var(--card-edge);border-radius:12px;
    padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .extra-item:active{transform:scale(.98)}
  .extra-item .t{font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .extra-item .c{font-size:11px;color:var(--ink-dim);flex-shrink:0}
  .add-extra{
    width:100%;background:transparent;border:1px dashed var(--card-edge);color:var(--ink-dim);
    border-radius:12px;padding:12px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .add-extra:active{background:var(--night-2)}
  .backup-row{display:flex;gap:8px}
  .tool-btn{
    flex:1;background:var(--card);border:1px solid var(--card-edge);color:var(--ink-dim);
    border-radius:12px;padding:12px;font-size:13px;cursor:pointer;font-family:var(--sans);
  }
  .tool-btn:active{background:var(--night-2)}

  /* ---- viewer / editor overlay ---- */
  .overlay{
    position:fixed;inset:0;z-index:10;background:var(--night);
    display:none;flex-direction:column;
  }
  .overlay.open{display:flex}
  .ov-head{
    display:flex;align-items:center;gap:10px;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
    border-bottom:1px solid var(--card-edge);background:var(--night-2);
  }
  .ov-title{font-family:var(--serif);font-size:16px;letter-spacing:.1em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ov-title .sym{color:var(--gold);margin-right:6px}
  .icon-btn{
    background:transparent;border:1px solid var(--card-edge);color:var(--ink);
    border-radius:10px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:var(--sans);flex-shrink:0;
  }
  .icon-btn:active{background:var(--card)}
  .icon-btn.danger{color:var(--danger);border-color:#5a3040}

  .ov-body{flex:1;overflow-y:auto;padding:18px 16px 120px;-webkit-overflow-scrolling:touch}
  .article-text{
    font-family:var(--serif);font-size:15px;line-height:2.0;letter-spacing:.03em;
    white-space:pre-wrap;word-break:break-word;color:var(--ink);
  }
  .meta-line{font-size:11px;color:var(--ink-dim);margin-bottom:16px;letter-spacing:.05em}
  .count-adjust{
    display:none;align-items:center;gap:10px;margin:-6px 0 18px;
    font-size:11px;color:var(--ink-dim);letter-spacing:.05em;
  }
  .count-adjust.show{display:flex}
  .count-adjust b{color:var(--ok);font-size:16px;min-width:24px;text-align:center;font-family:var(--sans)}
  .ca-btn{
    width:38px;height:38px;border-radius:10px;background:var(--night-2);
    border:1px solid var(--card-edge);color:var(--ink);font-size:17px;
    cursor:pointer;font-family:var(--sans);line-height:1;
  }
  .ca-btn:active{background:var(--card)}
  .ca-hint{font-size:10px}

  textarea.editor{
    width:100%;min-height:55vh;background:var(--night-2);border:1px solid var(--card-edge);
    border-radius:12px;color:var(--ink);font-family:var(--serif);font-size:15px;line-height:1.9;
    padding:14px;resize:vertical;
  }
  textarea.editor:focus{outline:2px solid var(--gold-dim);outline-offset:1px}
  input.title-input{
    width:100%;background:var(--night-2);border:1px solid var(--card-edge);border-radius:10px;
    color:var(--ink);font-size:15px;padding:11px 13px;margin-bottom:10px;font-family:var(--sans);
  }
  input.title-input:focus{outline:2px solid var(--gold-dim);outline-offset:1px}

  .ov-foot{
    position:fixed;left:0;right:0;bottom:0;padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--night) 30%);
    display:flex;gap:10px;max-width:640px;margin:0 auto;
  }
  .big-btn{
    flex:1;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:600;
    cursor:pointer;font-family:var(--sans);letter-spacing:.08em;
  }
  .big-btn.gold{background:var(--gold);color:#1a1508}
  .big-btn.gold:active{background:var(--gold-dim)}
  .big-btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--card-edge)}

  .empty-note{color:var(--ink-dim);font-size:13px;line-height:1.9;text-align:center;padding:40px 20px}

  .toast{
    position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);
    background:var(--gold);color:#1a1508;font-size:13px;font-weight:600;
    padding:10px 22px;border-radius:999px;opacity:0;pointer-events:none;
    transition:opacity .2s, transform .2s;z-index:20;letter-spacing:.05em;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--danger);color:#fff}

  .undo-bar{
    position:fixed;left:50%;bottom:34px;transform:translateX(-50%);
    background:var(--card);border:1px solid var(--gold-dim);border-radius:999px;
    display:none;align-items:center;gap:14px;padding:10px 10px 10px 20px;
    z-index:21;box-shadow:0 4px 20px rgba(0,0,0,.5);max-width:92vw;
  }
  .undo-bar.show{display:flex}
  .undo-bar .ut{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .undo-bar button{
    background:var(--gold);color:#1a1508;border:none;border-radius:999px;
    padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);
    flex-shrink:0;letter-spacing:.05em;
  }
  .undo-bar button:active{background:var(--gold-dim)}

  .loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--night);z-index:30;color:var(--ink-dim);font-size:13px;letter-spacing:.2em}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="loading" id="loading">読み込み中…</div>
<div id="storageWarn" style="display:none;position:relative;z-index:2;background:#5a3040;color:#ffd9d9;font-size:12px;line-height:1.7;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;text-align:center">
  ⚠ この開き方ではデータを保存できません(ファイルのプレビュー表示です)。<br>SafariでURL(GitHub Pages)から開いてください。
</div>

<div class="wrap">
  <header>
    <h1>記事保管庫<small>MONTHLY ARCHIVE</small></h1>
    <div class="month-nav">
      <button class="mn-btn" id="mPrev" aria-label="前の月">◀</button>
      <button class="month-tag" id="monthTag" title="タップで年月を選択"><b id="monthLabel"></b></button>
      <button class="mn-btn" id="mNext" aria-label="次の月">▶</button>
    </div>
  </header>

  <div class="grid" id="signGrid"></div>

  <div class="section-label">その他のテキスト</div>
  <div class="extra-list" id="extraList"></div>
  <button class="add-extra" id="addExtra">＋ テキストを追加</button>

  <div class="section-label">バックアップ</div>
  <div class="backup-row">
    <button class="tool-btn" id="exportBtn">全データを書き出し</button>
    <button class="tool-btn" id="importBtn">ファイルから復元</button>
  </div>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none">

  <div class="section-label">クラウド同期(iPhone・Mac共用)</div>
  <div class="backup-row">
    <button class="tool-btn" id="syncSetupBtn">同期を設定</button>
    <button class="tool-btn" id="syncNowBtn">今すぐ同期</button>
  </div>
  <div class="empty-note" id="syncStatus" style="text-align:left;padding:8px 4px;font-size:12px">未設定(設定するとiPhoneとMacでデータを共有できます)</div>

  <div class="section-label">データ整理</div>
  <div class="backup-row">
    <button class="tool-btn" id="clearMonthBtn">この月を空にする</button>
    <button class="tool-btn" id="clearOldBtn">古い号を削除</button>
  </div>
  <div class="backup-row" style="margin-top:8px">
    <button class="tool-btn" id="clearPrevBtn">「前の版」をまとめて削除して軽量化</button>
  </div>
  <div class="backup-row" style="margin-top:8px">
    <button class="tool-btn" id="resetCountBtn">この月のコピー回数をリセット</button>
  </div>
  <div class="empty-note" id="statsInfo" style="text-align:left;padding:8px 4px;font-size:12px"></div>
</div>

<!-- viewer -->
<div class="overlay" id="viewer">
  <div class="ov-head">
    <button class="icon-btn" id="vBack">← 戻る</button>
    <div class="ov-title" id="vTitle"></div>
    <button class="icon-btn" id="vEdit">編集</button>
  </div>
  <div class="ov-body">
    <div class="meta-line" id="vMeta"></div>
    <div class="count-adjust" id="vCountRow">
      <span>コピー回数</span>
      <button class="ca-btn" id="vMinus" aria-label="コピー回数を1減らす">−</button>
      <b id="vCount">0</b>
      <button class="ca-btn" id="vPlus" aria-label="コピー回数を1増やす">＋</button>
      <span class="ca-hint">数え間違いはここで修正できます</span>
    </div>
    <div class="article-text" id="vText"></div>
  </div>
  <div class="ov-foot">
    <button class="big-btn ghost" id="vRevert" style="display:none;flex:0 0 auto;padding:16px 18px">前の版</button>
    <button class="big-btn gold" id="vCopy">本文をコピー</button>
  </div>
</div>

<!-- editor -->
<div class="overlay" id="editor">
  <div class="ov-head">
    <button class="icon-btn" id="eCancel">キャンセル</button>
    <div class="ov-title" id="eTitle">編集</div>
    <button class="icon-btn danger" id="eDelete">削除</button>
  </div>
  <div class="ov-body">
    <input class="title-input" id="eTitleInput" placeholder="タイトル(その他テキスト用)" style="display:none">
    <input class="title-input" id="eMonthInput" placeholder="対象月(例:2026年8月号)">
    <button class="icon-btn" id="ePasteBtn" style="width:100%;margin-bottom:10px;padding:12px">クリップボードから貼り付け</button>
    <textarea class="editor" id="eText" placeholder="ここに記事本文を貼り付け(上のボタンか、長押し→ペースト)"></textarea>
  </div>
  <div class="ov-foot">
    <button class="big-btn ghost" id="eCancel2">キャンセル</button>
    <button class="big-btn gold" id="eSave">保存する</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="undo-bar" id="undoBar">
  <span class="ut" id="undoText"></span>
  <button id="undoBtn">元に戻す</button>
</div>

<!-- 年月ピッカー -->
<div class="overlay" id="picker">
  <div class="ov-head">
    <button class="icon-btn" id="pCancel">キャンセル</button>
    <div class="ov-title">年月を入力</div>
    <button class="icon-btn" id="pGo">表示</button>
  </div>
  <div class="ov-body">
    <div class="pick-row">
      <input class="pick-num" id="pYear" type="text" inputmode="numeric" placeholder="26">
      <span class="pick-unit">年</span>
      <input class="pick-num" id="pMonth" type="text" inputmode="numeric" placeholder="8">
      <span class="pick-unit">月号</span>
    </div>
    <div class="empty-note" style="padding:4px 4px 10px">
      下2桁OK(26 → 2026年)。「26 8」のようにまとめ打ちも可。エンターで確定。
    </div>
    <div class="pick-row" style="margin-top:0">
      <select class="pick-sel" id="pYearSel"></select>
      <select class="pick-sel" id="pMonthSel"></select>
    </div>
    <div class="empty-note" style="padding:4px 4px 10px">プルダウンで月を選ぶとすぐ表示されます</div>
    <div class="empty-note" id="pInfo" style="text-align:left;padding:10px 4px"></div>
  </div>
</div>

<script>
const SIGNS = [
  {id:"aries",sym:"♈\uFE0E",nm:"牡羊座"},{id:"taurus",sym:"♉\uFE0E",nm:"牡牛座"},
  {id:"gemini",sym:"♊\uFE0E",nm:"双子座"},{id:"cancer",sym:"♋\uFE0E",nm:"蟹座"},
  {id:"leo",sym:"♌\uFE0E",nm:"獅子座"},{id:"virgo",sym:"♍\uFE0E",nm:"乙女座"},
  {id:"libra",sym:"♎\uFE0E",nm:"天秤座"},{id:"scorpio",sym:"♏\uFE0E",nm:"蠍座"},
  {id:"sagittarius",sym:"♐\uFE0E",nm:"射手座"},{id:"capricorn",sym:"♑\uFE0E",nm:"山羊座"},
  {id:"aquarius",sym:"♒\uFE0E",nm:"水瓶座"},{id:"pisces",sym:"♓\uFE0E",nm:"魚座"}
];
const KEY = "article-vault-v1";
const LEGACY_KEY = "hoshino-article-vault-v1"; // 旧キーからの引き継ぎ用

// 本文解析用:各星座の表記ゆれ(漢字・ひらがな・カタカナ)
const SIGN_VARIANTS = {
  aries:["牡羊座","おひつじ座","オヒツジ座","アリエス"],
  taurus:["牡牛座","おうし座","オウシ座","タウルス"],
  gemini:["双子座","ふたご座","フタゴ座","ジェミニ"],
  cancer:["蟹座","かに座","カニ座","キャンサー"],
  leo:["獅子座","しし座","シシ座"],
  virgo:["乙女座","おとめ座","オトメ座","ヴァルゴ","バルゴ"],
  libra:["天秤座","てんびん座","テンビン座","リブラ"],
  scorpio:["蠍座","さそり座","サソリ座","スコーピオ"],
  sagittarius:["射手座","いて座","イテ座","サジタリウス"],
  capricorn:["山羊座","やぎ座","ヤギ座","カプリコーン"],
  aquarius:["水瓶座","みずがめ座","ミズガメ座","アクエリアス"],
  pisces:["魚座","うお座","ウオ座","ピスケス"]
};
function countOcc(text, word){
  let c=0, i=0;
  while((i = text.indexOf(word, i)) !== -1){ c++; i += word.length; }
  return c;
}
// 本文を読んで「何年何月の記事か」「どの星座の内容か」を判定
// 星座の判定基準(重要度順):
//   1.「◯◯座のあなた」という読者への呼びかけ(×20)…対象星座にしか使われない決定的な手がかり
//   2. 冒頭400字での登場(×5)…タイトル・導入は対象星座が出やすい
//   3. 本文全体での登場(×1)…天体イベントで他星座も頻出するため弱い手がかり
// 月:冒頭400字にある年月を最優先。なければ本文全体で最も多く登場する年月。
function analyzeBody(body, signId){
  const lead = body.slice(0, 400);
  const scores = {};
  SIGNS.forEach(s=>{
    const ws = SIGN_VARIANTS[s.id];
    const youC  = ws.reduce((a,w)=>a+countOcc(body, w+"のあなた"),0);
    const leadC = ws.reduce((a,w)=>a+countOcc(lead,w),0);
    const allC  = ws.reduce((a,w)=>a+countOcc(body,w),0);
    scores[s.id] = youC*20 + leadC*5 + allC;
  });
  const target = scores[signId] || 0;
  let topId = null, top = 0;
  for(const id in scores){ if(scores[id] > top){ top = scores[id]; topId = id; } }
  let match, detected = null;
  if(top === 0){ match = "none"; }
  else if(target > 0 && target >= top){ match = "ok"; }
  else { match = "mismatch"; detected = SIGNS.find(s=>s.id===topId); }
  let month = null;
  const lm = lead.match(/(20\d{2})\s*年\s*(\d{1,2})\s*月/);
  if(lm && +lm[2] >= 1 && +lm[2] <= 12){
    month = `${lm[1]}年${+lm[2]}月`;
  }else{
    const re = /(20\d{2})\s*年\s*(\d{1,2})\s*月/g;
    const freq = {}; let m;
    while((m = re.exec(body)) !== null){
      if(+m[2] < 1 || +m[2] > 12) continue; // ありえない月は無視
      const k = `${m[1]}年${+m[2]}月`;
      freq[k] = (freq[k]||0)+1;
    }
    let bk = null, bc = 0;
    for(const k in freq){ if(freq[k] > bc){ bc = freq[k]; bk = k; } }
    month = bk;
  }
  return { match, detected, month };
}

let state = { current:"", months:{}, extras:[] };
let current = null; // {kind:"sign"|"extra", id or index}

// ---- 年月ヘルパー(2026年1月〜2100年12月)----
const Y_MIN = 2026, Y_MAX = 2100;
function keyOf(y,m){ return y + "-" + String(m).padStart(2,"0"); }
function parseKey(k){ const p = k.split("-"); return { y:+p[0], m:+p[1] }; }
function labelOf(k){ const p = parseKey(k); return `${p.y}年${p.m}月号`; }
function shortOf(k){ const p = parseKey(k); return `${p.y}年${p.m}月`; }
function clampKey(y,m){
  if(y < Y_MIN){ y = Y_MIN; m = 1; }
  if(y > Y_MAX){ y = Y_MAX; m = 12; }
  return keyOf(y,m);
}
function shiftMonth(k, delta){
  let {y,m} = parseKey(k);
  m += delta;
  while(m < 1){ m += 12; y--; }
  while(m > 12){ m -= 12; y++; }
  return clampKey(y,m);
}
function defaultKey(){
  const d = new Date();
  let y = d.getFullYear(), m = d.getMonth()+2;
  if(m > 12){ m = 1; y++; }
  return clampKey(y,m);
}
function keyFromLabel(lbl){
  const m = (lbl||"").match(/(20\d{2})\s*年\s*(\d{1,2})\s*月/);
  return m ? clampKey(+m[1], +m[2]) : null;
}
// 表示中の月の星座データ(読み取り用/書き込み用)
function getSigns(){ return (state.months[state.current]||{}).signs || {}; }
function curSigns(){
  if(!state.months[state.current]) state.months[state.current] = {signs:{}};
  return state.months[state.current].signs;
}
// 旧形式データ(単一月)からの移行 + 壊れたデータの無害化
function validKey(k){
  if(!/^\d{4}-\d{2}$/.test(k||"")) return false;
  const p = parseKey(k);
  return p.y >= Y_MIN && p.y <= Y_MAX && p.m >= 1 && p.m <= 12;
}
function migrate(d){
  if(d && d.months){
    if(!validKey(d.current)) d.current = defaultKey();
    if(typeof d.months !== "object" || Array.isArray(d.months)) d.months = {};
    for(const k of Object.keys(d.months)){
      if(!validKey(k) || !d.months[k] || typeof d.months[k].signs !== "object"){ delete d.months[k]; }
    }
    if(!Array.isArray(d.extras)) d.extras = [];
    return d;
  }
  const key = keyFromLabel(d && d.month) || defaultKey();
  const months = {};
  if(d && d.signs && typeof d.signs === "object" && Object.keys(d.signs).length){ months[key] = {signs:d.signs}; }
  return { current:key, months, extras:(d && Array.isArray(d.extras)) ? d.extras : [] };
}

// ---- storage(アプリ保存領域 → localStorage → メモリのみ、の順で自動判定)----
const hasAppStorage = !!(window.storage && typeof window.storage.get === "function");
let hasLocalStorage = false;
try{
  localStorage.setItem("__vault_test__","1");
  localStorage.removeItem("__vault_test__");
  hasLocalStorage = true;
}catch(e){ hasLocalStorage = false; }
const memoryOnly = !hasAppStorage && !hasLocalStorage;
async function load(){
  try{
    let raw = null;
    if(hasAppStorage){
      const r = await window.storage.get(KEY);
      raw = r && r.value;
      if(!raw){
        try{ const r2 = await window.storage.get(LEGACY_KEY); raw = r2 && r2.value; }catch(e2){}
      }
    }else if(hasLocalStorage){
      raw = localStorage.getItem(KEY) || localStorage.getItem(LEGACY_KEY);
    }
    if(raw) state = migrate(JSON.parse(raw));
  }catch(e){ /* 初回はキーが無いので正常 */ }
  if(!state.current) state.current = defaultKey();
  if(!state.months) state.months = {};
  if(!state.extras) state.extras = [];
  if(memoryOnly) document.getElementById("storageWarn").style.display = "block";
  document.getElementById("loading").style.display = "none";
  render();
  await loadSyncConfig();
  if(sync){
    setSyncStatus(`同期ID: ${sync.gistId} ／ 確認中…`);
    syncNow(false); // 起動時に自動同期(新しい方を採用)
  }
}
async function save(silent){
  try{
    state.savedAt = Date.now();
    const raw = JSON.stringify(state);
    if(raw.length > 4.5 * 1024 * 1024 && !silent){
      toast("⚠ 容量が上限(約5MB)に近づいています。「データ整理」で古い号の削除を", true);
    }
    if(hasAppStorage){ await window.storage.set(KEY, raw); }
    else if(hasLocalStorage){ localStorage.setItem(KEY, raw); }
    // memoryOnly時は画面上は動くが保存されない(バナーで警告済み)
    scheduleCloudPush();
    return true;
  }catch(e){
    if(!silent) toast("保存に失敗しました。バックアップ書き出しをおすすめします", true);
    return silent ? true : false; // 位置記録などの軽い保存は失敗しても操作を止めない
  }
}

// ---- render ----
function render(){
  document.getElementById("monthLabel").textContent = labelOf(state.current);
  const signs = getSigns();
  const boardMonth = shortOf(state.current);

  grid.innerHTML = "";
  SIGNS.forEach(s=>{
    const d = signs[s.id];

    const cnt = (d && d.copyCount) || 0; // この記事をコピーした回数
    let vf = "";
    if(a){
      if(a.match === "ok") vf = `<span class="vf ok">✓ ${s.nm}の内容</span>`;

      }
    }

    el.innerHTML = `
      <button class="sc-main">

        <span class="st">${d && d.body ? (month ? month+" ／ " : "") + d.body.length.toLocaleString()+"字" : "未格納"}</span>${vf}
      </button>
      <div class="sc-actions">
        <button class="sc-act copy">コピー${cnt ? `<span class="cc">${cnt}</span>` : ""}</button>
        <button class="sc-act paste">ペースト</button>
      </div>`;
    el.querySelector(".sc-main").onclick = ()=> openSign(s.id);
    el.querySelector(".sc-act.copy").onclick = ()=> copySign(s.id);
    el.querySelector(".sc-act.paste").onclick = ()=> pasteAndSave(s.id);
    grid.appendChild(el);
  });
  const list = document.getElementById("extraList");
  list.innerHTML = "";
  if(!state.extras.length){
    list.innerHTML = `<div class="empty-note" style="padding:10px">お知らせ文・定型文など、星座以外のテキストもここに置けます</div>`;
  }
  state.extras.forEach((x,i)=>{
    const el = document.createElement("button");
    el.className = "extra-item";

    el.innerHTML = `<span class="t">${esc(x.title||"無題")}</span><span class="c">${x.month ? esc(x.month)+" ／ " : ""}${(x.body||"").length.toLocaleString()}字${xc}</span>`;
    el.onclick = ()=> openExtra(i);
    list.appendChild(el);
  });
  updateStats();
}
function esc(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function nowStamp(){
  const n = new Date();
  return `${n.getFullYear()}/${n.getMonth()+1}/${n.getDate()} ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`;
}

// ---- ワンタップ貼り付け保存 ----
// コピーに成功したら true を返す(コピー回数のカウントに使う)
async function copyText(text, okMsg){
  try{
    await navigator.clipboard.writeText(text);
    toast(okMsg);
    return true;
  }catch(e){
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    let ok = false;
    try{ ok = document.execCommand("copy"); }catch(e2){ ok = false; }
    document.body.removeChild(ta);
    if(ok) toast(okMsg);
    else toast("コピーできませんでした", true);
    return ok;
  }
}
// コピーに成功したら回数を1増やして保存・表示に反映
async function bumpCopyCount(obj){
  obj.copyCount = (obj.copyCount||0) + 1;
  obj.countAt = Date.now(); // 回数を最後に変更した時刻(同期の勝敗判定に使う)
  await save(true); // 回数の記録だけなので失敗しても操作は止めない
  render();
  return obj.copyCount;
}
// 「コピー→ペーストで1回」の判定:
// アプリを離れずに同じ記事をコピーし直しても回数は増やさない(ダブルタップ対策)。
// 一度アプリを離れて(=ペーストしに行って)戻ってきたら、次のコピーは新しい1回と数える。
let lastCopy = { key:null, left:false };
window.addEventListener("blur", ()=>{ lastCopy.left = true; });
document.addEventListener("visibilitychange", ()=>{ if(document.hidden) lastCopy.left = true; });
function isRepeatCopy(key){ return lastCopy.key === key && !lastCopy.left; }
function markCopied(key){ lastCopy = { key, left:false }; }
async function copySign(id){
  const s = SIGNS.find(x=>x.id===id);
  const d = getSigns()[id];
  if(!d || !d.body){ toast(`${labelOf(state.current)}の${s.nm}は未格納です`, true); return; }
  current = {kind:"sign", id};
  const key = "sign/" + state.current + "/" + id;
  const repeat = isRepeatCopy(key); // ペーストしに行く前のコピーし直しは数えない
  const msg = repeat
    ? `${s.nm}をコピーし直しました(回数はそのまま${d.copyCount||0}回)`
    : `${s.nm}の本文をコピーしました(${(d.copyCount||0)+1}回目・${d.body.length.toLocaleString()}字)`;
  if(await copyText(d.body, msg)){
    if(!repeat) await bumpCopyCount(d);
    markCopied(key);
  }
}
async function pasteAndSave(id){
  const s = SIGNS.find(x=>x.id===id);
  current = {kind:"sign", id};
  const signs = curSigns();
  // ※クリップボードはボタンを押した直後しか読めない(特にiOS)ので、
  //   確認ダイアログより先に読む
  let text = "";
  try{
    text = await navigator.clipboard.readText();
  }catch(e){
    openEditor();
    quickPaste = true; // 貼り付けた瞬間に自動保存するモード
    toast("この画面では直接読めないため貼り付け画面を開きました。貼り付けるだけで自動保存されます", true);
    return;
  }
  if(!text || !text.trim()){
    toast("クリップボードが空です。本文をコピーしてからタップしてください", true);
    return;
  }
  if(signs[id] && signs[id].body){
    if(!confirm(`${labelOf(state.current)}の${s.nm}は格納済みです。上書きしますか?`)) return;
  }
  const a = analyzeBody(text, id);
  const old = signs[id];
  const prev = (old && old.body) ? { body:old.body, month:old.month, updated:old.updated } : undefined;
  // 取り消し用にペースト前の状態を記録
  lastPaste = {
    monthKey: state.current,
    signId: id,
    before: old ? JSON.parse(JSON.stringify(old)) : null
  };
  // 新しい本文で上書きしたらコピー回数は0から数え直し(countAtで「0にした」ことも記録)
  signs[id] = { body:text, month: a.month ? a.month+"号" : labelOf(state.current), updated: nowStamp(), prev, countAt: Date.now() };
  if(await save()){
    const boardMonth = shortOf(state.current);
    if(a.match === "mismatch") toast(`保存しましたが ⚠ ${a.detected.nm}の内容かもしれません`, true);
    else if(a.month && a.month !== boardMonth) toast(`保存しましたが ⚠ ${a.month}の記事かもしれません`, true);
    else if(a.match === "none") toast(`保存しました(⚠ 本文に星座名なし)`, true);
    else toast(`${labelOf(state.current)}の${s.nm}に保存しました(${text.length.toLocaleString()}字)`);
    showUndoBar(`${s.nm}にペーストしました`);
    render();
  }
}

// ---- ペーストの取り消し ----
let lastPaste = null; // {monthKey, signId, before}
let undoTimer = null;
function showUndoBar(msg){
  document.getElementById("undoText").textContent = msg;
  document.getElementById("undoBar").classList.add("show");
  clearTimeout(undoTimer);
  undoTimer = setTimeout(hideUndoBar, 10000); // 10秒表示
}
function hideUndoBar(){
  document.getElementById("undoBar").classList.remove("show");
}
async function undoPaste(){
  if(!lastPaste){ hideUndoBar(); return; }
  // 月が(月まとめ削除などで)消えていても、復元先を作り直して確実に戻す
  if(lastPaste.before && !state.months[lastPaste.monthKey]){
    state.months[lastPaste.monthKey] = { signs: {} };
  }
  const mo = state.months[lastPaste.monthKey];
  if(mo && mo.signs){
    if(lastPaste.before) mo.signs[lastPaste.signId] = lastPaste.before;
    else delete mo.signs[lastPaste.signId];
  }
  const s = SIGNS.find(x=>x.id===lastPaste.signId);
  lastPaste = null;
  hideUndoBar();
  if(await save()){
    render();
    toast(`${s.nm}をペースト前の状態に戻しました`);
  }
}

// ---- viewer ----
function openSign(id){
  current = {kind:"sign", id};
  const s = SIGNS.find(x=>x.id===id);
  const d = getSigns()[id];
  if(!d || !d.body){ openEditor(); return; } // 未格納の「開く」は手動貼り付け画面へ
  document.getElementById("vTitle").innerHTML = `<span class="sym">${s.sym}</span>${s.nm}<span style="font-size:12px;color:var(--ink-dim)"> ${labelOf(state.current)}</span>`;
  const a = analyzeBody(d.body, id);
  const boardMonth = shortOf(state.current);
  const month = a.month || d.month || labelOf(state.current);
  let check = "";
  if(a.match === "ok") check = " ／ ✓ 内容一致";
  else if(a.match === "mismatch") check = ` ／ ⚠ ${a.detected.nm}の内容の可能性`;
  else check = " ／ ⚠ 本文に星座名なし";
  if(a.month && a.month !== boardMonth) check += ` ／ ⚠ ${a.month}の記事の可能性`;
  document.getElementById("vMeta").textContent = `${month} ／ ${d.body.length.toLocaleString()}字 ／ 更新 ${d.updated||"—"}${check}`;
  document.getElementById("vCount").textContent = d.copyCount||0;
  document.getElementById("vCountRow").classList.add("show");
  document.getElementById("vText").textContent = d.body;
  document.getElementById("vRevert").style.display = (d.prev && d.prev.body) ? "block" : "none";
  showOverlay("viewer");
}
function openExtra(i){
  current = {kind:"extra", index:i};
  const x = state.extras[i];
  document.getElementById("vTitle").textContent = x.title || "無題";
  document.getElementById("vMeta").textContent = `${x.month ? x.month+" ／ " : ""}${(x.body||"").length.toLocaleString()}字 ／ 更新 ${x.updated||"—"}`;
  document.getElementById("vCount").textContent = x.copyCount||0;
  document.getElementById("vCountRow").classList.toggle("show", !!(x.body));
  document.getElementById("vText").textContent = x.body || "";
  document.getElementById("vRevert").style.display = (x.prev && x.prev.body) ? "block" : "none";
  showOverlay("viewer");
}

// ---- editor ----
let quickPaste = false; // ペーストボタン経由:貼り付けた瞬間に自動保存
function openEditor(){
  quickPaste = false; // 通常の編集で誤発動しないようリセット(ペースト経由は呼び出し後にtrueにする)
  const ti = document.getElementById("eTitleInput");
  const mi = document.getElementById("eMonthInput");
  const ta = document.getElementById("eText");
  if(current.kind==="sign"){
    const s = SIGNS.find(x=>x.id===current.id);
    document.getElementById("eTitle").innerHTML = `<span class="sym" style="color:var(--gold)">${s.sym}</span> ${s.nm} <span style="font-size:12px;color:var(--ink-dim)">${labelOf(state.current)}</span>`;
    ti.style.display = "none";
    mi.style.display = "none"; // 星座記事の月はボードの月で決まる
    ta.value = (getSigns()[current.id]||{}).body || "";
  }else{
    document.getElementById("eTitle").textContent = "テキスト";
    ti.style.display = "block";
    mi.style.display = "block";
    if(current.index === -1){ ti.value=""; ta.value=""; }
    else{ ti.value = state.extras[current.index].title||""; ta.value = state.extras[current.index].body||""; }
    const existing = current.index>=0 ? state.extras[current.index] : {};
    mi.value = existing.month || labelOf(state.current);
  }
  hideOverlay("viewer");
  showOverlay("editor");
  setTimeout(()=>ta.focus(), 100);
}
async function saveEditor(){
  const body = document.getElementById("eText").value;
  const stamp = nowStamp();
  if(current.kind==="sign"){
    const signs = curSigns();
    if(body.trim()){
      const a = analyzeBody(body, current.id);
      const month = a.month ? a.month+"号" : labelOf(state.current);
      const old = signs[current.id];
      const prev = (old && old.body && old.body !== body)
        ? { body:old.body, month:old.month, updated:old.updated }
        : (old ? old.prev : undefined);
      // 手直し(編集)ではコピー回数と回数変更時刻を引き継ぐ
      signs[current.id] = {body, month, updated:stamp, prev, copyCount:(old && old.copyCount) || 0, countAt:(old && old.countAt) || 0};
    }
    else delete signs[current.id];
  }else{
    const month = document.getElementById("eMonthInput").value.trim() || labelOf(state.current);
    const title = document.getElementById("eTitleInput").value.trim() || "無題";
    if(current.index === -1){
      if(body.trim()||title!=="無題"){ state.extras.push({title, body, month, updated:stamp}); current.index = state.extras.length-1; }
    }else{
      const old = state.extras[current.index];
      const prev = (old && old.body && old.body !== body)
        ? { body:old.body, month:old.month, updated:old.updated }
        : (old ? old.prev : undefined);
      state.extras[current.index] = {title, body, month, updated:stamp, prev, copyCount:(old && old.copyCount) || 0, countAt:(old && old.countAt) || 0};
    }
  }
  if(await save()){
    toast("保存しました");
    hideOverlay("editor");
    render();
  }
}
async function deleteCurrent(){
  if(!confirm("この本文を削除しますか?")) return;
  if(current.kind==="sign") delete curSigns()[current.id];
  else if(current.index >= 0) state.extras.splice(current.index,1);
  if(await save()){
    toast("削除しました");
    hideOverlay("editor");
    render();
  }
}

// ---- copy ----
async function copyBody(){
  const obj = current.kind==="sign" ? getSigns()[current.id] : state.extras[current.index];
  const text = (obj && obj.body) || "";
  if(!text){ toast("本文がありません", true); return; }
  const key = current.kind==="sign" ? ("sign/" + state.current + "/" + current.id) : ("extra/" + current.index);
  const repeat = isRepeatCopy(key); // ペーストしに行く前のコピーし直しは数えない
  const msg = repeat
    ? `コピーし直しました(回数はそのまま${obj.copyCount||0}回)`
    : `コピーしました(${(obj.copyCount||0)+1}回目)`;
  if(await copyText(text, msg)){
    if(!repeat){
      await bumpCopyCount(obj);
      // 閲覧画面のメタ情報(コピー回数)も更新
      if(current.kind==="sign") openSign(current.id); else openExtra(current.index);
    }
    markCopied(key);
  }
}

// ---- コピー回数の手動修正(−/＋)----
function curObj(){
  return current && current.kind==="sign" ? getSigns()[current.id] : (current ? state.extras[current.index] : null);
}
async function adjustCount(delta){
  const obj = curObj();
  if(!obj) return;
  const now = obj.copyCount||0;
  const v = Math.max(0, now + delta);
  if(v === now){ if(delta < 0) toast("0回より下にはできません", true); return; }
  obj.copyCount = v;
  obj.countAt = Date.now(); // 手動修正も「最後に回数を触った」扱いにして同期で消えないようにする
  lastCopy = { key:null, left:false }; // 修正後の次のコピーは必ず新しい1回として数える
  document.getElementById("vCount").textContent = v;
  await save(true);
  render();
}

// ---- 前の版に戻す(現在の版と入れ替え。もう一度押せば戻せる)----
async function revertCurrent(){
  const obj = current.kind==="sign" ? getSigns()[current.id] : state.extras[current.index];
  if(!obj || !obj.prev || !obj.prev.body){ toast("前の版はありません", true); return; }
  if(!confirm("前の版に戻しますか?(現在の本文と入れ替わります)")) return;
  const cur = { body:obj.body, month:obj.month, updated:obj.updated };
  obj.body = obj.prev.body; obj.month = obj.prev.month; obj.updated = obj.prev.updated;
  obj.prev = cur;
  if(await save()){
    toast("前の版に戻しました(もう一度押すと元に戻せます)");
    render();
    if(current.kind==="sign") openSign(current.id); else openExtra(current.index);
  }
}

// ---- クラウド同期(GitHub Gist・無料)----
const SYNC_KEY = "article-vault-sync-v1";
const GIST_FILE = "article-vault.json";
let sync = null; // {token, gistId, pass, lastAt}
let pushTimer = null;

// ---- 暗号化(AES-GCM・パスワード方式)----
// クラウドには暗号化した文字列だけを置く。パスワードは各端末の中にのみ保存。
function b64(buf){
  let s = "", u = new Uint8Array(buf);
  for(let i=0; i<u.length; i+=0x8000) s += String.fromCharCode.apply(null, u.subarray(i, i+0x8000));
  return btoa(s);
}
function unb64(s){ return Uint8Array.from(atob(s), c=>c.charCodeAt(0)); }
async function deriveKey(pass, salt){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:150000, hash:"SHA-256" },
    km, { name:"AES-GCM", length:256 }, false, ["encrypt","decrypt"]
  );
}
async function encryptState(pass){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(pass, salt);
  const ct = await crypto.subtle.encrypt({ name:"AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(state)));
  return JSON.stringify({ enc:1, salt:b64(salt), iv:b64(iv), data:b64(ct) });
}
async function decryptPayload(text, pass){
  const obj = JSON.parse(text);
  if(!obj || !obj.enc) return obj; // 旧形式(平文)はそのまま読める
  try{
    const key = await deriveKey(pass || "", unb64(obj.salt));
    const pt = await crypto.subtle.decrypt({ name:"AES-GCM", iv:unb64(obj.iv) }, key, unb64(obj.data));
    return JSON.parse(new TextDecoder().decode(pt));
  }catch(e){ throw new Error("pass"); }
}

// ---- 競合時のマージ(記事単位で新しい方を採用)----
function parseUpd(u){
  const m = String(u||"").match(/(\d{4})\/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
  return m ? new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5]).getTime() : 0;
}
function mergeStates(a, b){
  const out = {
    current: (b.savedAt||0) > (a.savedAt||0) ? b.current : a.current,
    savedAt: Math.max(a.savedAt||0, b.savedAt||0),
    months: {}, extras: []
  };
  const keys = new Set([...Object.keys(a.months||{}), ...Object.keys(b.months||{})]);
  for(const k of keys){
    const sa = ((a.months||{})[k]||{}).signs || {};
    const sb = ((b.months||{})[k]||{}).signs || {};
    const merged = {};
    for(const id of new Set([...Object.keys(sa), ...Object.keys(sb)])){
      const x = sa[id], y = sb[id];
      if(x && y){
        // 本文は新しい方を採用。コピー回数は「最後に回数を変更した方」を採用
        // (max方式だとリセットが同期で打ち消されるため、時刻で勝敗を決める)
        const win = parseUpd(y.updated) > parseUpd(x.updated) ? y : x;
        const cw = (y.countAt||0) >= (x.countAt||0) ? y : x;
        merged[id] = Object.assign({}, win, { copyCount: cw.copyCount||0, countAt: Math.max(x.countAt||0, y.countAt||0) });
      }
      else merged[id] = x || y;
    }
    if(Object.keys(merged).length) out.months[k] = { signs: merged };
  }
  // その他テキスト:同じ内容は1つにまとめ、コピー回数を最後に触った方を残す
  const map = new Map();
  for(const x of [...(a.extras||[]), ...(b.extras||[])]){
    const sig = (x.title||"") + "\u0000" + (x.body||"");
    const p = map.get(sig);
    if(!p || (x.countAt||0) > (p.countAt||0)) map.set(sig, x);
  }
  out.extras = [...map.values()];
  return out;
}

function setSyncStatus(msg, err){
  const el = document.getElementById("syncStatus");
  el.textContent = msg;
  el.style.color = err ? "#e2a25a" : "";
}
function syncOkStatus(extra){
  const n = new Date();
  setSyncStatus(`🔒暗号化して同期済み ${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}${extra||""} ／ 同期ID: ${sync.gistId}`);
}
async function loadSyncConfig(){
  try{
    let raw = null;
    if(hasAppStorage){ const r = await window.storage.get(SYNC_KEY); raw = r && r.value; }
    else if(hasLocalStorage){ raw = localStorage.getItem(SYNC_KEY); }
    if(raw) sync = JSON.parse(raw);
  }catch(e){}
}
async function saveSyncConfig(){
  try{
    const raw = JSON.stringify(sync);
    if(hasAppStorage){ await window.storage.set(SYNC_KEY, raw); }
    else if(hasLocalStorage){ localStorage.setItem(SYNC_KEY, raw); }
  }catch(e){}
}
function gistHeaders(){
  return { "Authorization": "Bearer " + sync.token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" };
}
async function pullCloud(){
  const res = await fetch("https://api.github.com/gists/" + sync.gistId, { headers: gistHeaders() });
  if(res.status === 401) throw new Error("token");
  if(res.status === 404) throw new Error("gist");
  if(!res.ok) throw new Error("http" + res.status);
  const g = await res.json();
  const f = g.files && g.files[GIST_FILE];
  if(!f) return null;
  const content = f.truncated ? await (await fetch(f.raw_url)).text() : f.content;
  return decryptPayload(content, sync.pass);
}
async function pushCloud(){
  const content = sync.pass ? await encryptState(sync.pass) : JSON.stringify(state);
  const res = await fetch("https://api.github.com/gists/" + sync.gistId, {
    method: "PATCH",
    headers: gistHeaders(),
    body: JSON.stringify({ files: { [GIST_FILE]: { content } } })
  });
  if(res.status === 401) throw new Error("token");
  if(!res.ok) throw new Error("http" + res.status);
  sync.lastAt = state.savedAt || Date.now();
  saveSyncConfig();
}
function syncErrMsg(e){
  if(e && e.message === "token") return "同期エラー:トークンが無効か期限切れです。「同期を設定」からやり直してください";
  if(e && e.message === "gist") return "同期エラー:同期IDが見つかりません。「同期を設定」からやり直してください";
  if(e && e.message === "pass") return "同期エラー:暗号化パスワードが違います。「同期を設定」から入れ直してください";
  return "同期エラー:通信状態を確認してください";
}
function scheduleCloudPush(){
  if(syncBusy) return;
  if(!sync) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(()=> syncNow(false), 2000); // 押し込む前にも必ずクラウドを確認(同時編集対策)
}
let syncBusy = false;
async function syncNow(showToast){
  if(!sync){ toast("先に「同期を設定」を押してください", true); return; }
  if(syncBusy) return; // 二重実行の防止(クラウド保管庫の分裂対策)
  syncBusy = true;
  setSyncStatus("同期中…");
  try{
    const cloud = await pullCloud();
    const base = sync.lastAt || 0;
    const cloudAt = (cloud && cloud.savedAt) || 0;
    const localAt = state.savedAt || 0;
    if(!cloud || cloudAt <= base){
      // クラウドは前回同期から変わっていない → こちらの内容を送る(削除もそのまま反映)
      await pushCloud();
      syncOkStatus();
      if(showToast) toast("同期しました");
    }else if(localAt <= base){
      // こちらは変わっていない → クラウドをそのまま受け取る
      state = migrate(cloud);
      sync.lastAt = state.savedAt || Date.now();
      saveSyncConfig();
      await save(true);
      render();
      syncOkStatus();
      if(showToast) toast("クラウドの新しいデータを取り込みました");
    }else{
      // 両方で変更があった(同時編集)→ 記事単位で新しい方を残して統合
      state = migrate(mergeStates(migrate(cloud), state));
      await save(true);
      await pushCloud();
      render();
      syncOkStatus("(両端末の変更を統合)");
      if(showToast) toast("両方の変更を統合して同期しました");
    }
  }catch(e){
    setSyncStatus(syncErrMsg(e), true);
    if(showToast) toast("同期に失敗しました", true);
  }finally{
    syncBusy = false;
  }
}
async function setupSync(){
  const token = prompt("①GitHubのアクセストークンを貼り付けてください(gist権限のもの)。\n作り方: GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token → gistにチェック", sync ? sync.token : "");
  if(!token || !token.trim()) return;
  const pass = prompt("②暗号化パスワードを決めてください(両端末で同じものを入力)。\nクラウド上のデータはこのパスワードで暗号化され、他人には読めなくなります。\n※忘れるとクラウドのデータを取り出せなくなるので必ず控えてください", sync ? (sync.pass||"") : "");
  if(pass === null) return;
  if(!pass.trim()){ toast("暗号化パスワードは必須です", true); return; }
  const gid = prompt("③もう1台で設定済みなら「同期ID」を入力。\nこの端末が1台目なら空欄のままOKを押してください(新規作成します)", sync ? sync.gistId : "");
  if(gid === null) return;
  try{
    setSyncStatus("設定中…");
    if(gid && gid.trim()){
      sync = { token: token.trim(), gistId: gid.trim(), pass: pass.trim(), lastAt: 0 };
      await saveSyncConfig();
      await syncNow(true);
    }else{
      const tmpSync = { token: token.trim(), pass: pass.trim() };
      sync = tmpSync;
      const content = await encryptState(sync.pass);
      const res = await fetch("https://api.github.com/gists", {
        method: "POST",
        headers: { "Authorization": "Bearer " + sync.token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({
          description: "article-vault sync data (encrypted)",
          public: false,
          files: { [GIST_FILE]: { content } }
        })
      });
      if(res.status === 401) throw new Error("token");
      if(!res.ok) throw new Error("http" + res.status);
      const g = await res.json();
      sync = { token: token.trim(), gistId: g.id, pass: pass.trim(), lastAt: state.savedAt || Date.now() };
      await saveSyncConfig();
      syncOkStatus();
      alert("暗号化同期を開始しました。\n\nもう1台の端末では「同期を設定」で、同じトークン・同じ暗号化パスワードと、この同期IDを入力してください:\n\n" + g.id + "\n\n(同期IDはこの画面の下にも常に表示されます)");
    }
  }catch(e){
    sync = null;
    setSyncStatus(syncErrMsg(e), true);
  }
}

// ---- データ整理(まとめて削除)----
function storageStats(){
  let months = 0, articles = 0, chars = 0;
  for(const k in state.months){
    const s = (state.months[k]||{}).signs || {};
    let n = 0;
    for(const id in s){
      if(s[id] && s[id].body){
        n++;
        chars += s[id].body.length;
        if(s[id].prev && s[id].prev.body) chars += s[id].prev.body.length;
      }
    }
    if(n > 0){ months++; articles += n; }
  }
  for(const x of state.extras){ chars += (x.body||"").length; if(x.prev && x.prev.body) chars += x.prev.body.length; }
  return { months, articles, chars };
}
function updateStats(){
  const st = storageStats();
  const mb = (JSON.stringify(state).length / 1024 / 1024);
  document.getElementById("statsInfo").textContent =
    `現在:${st.months}ヶ月分・${st.articles}記事・約${st.chars.toLocaleString()}字(容量の目安 ${mb < 0.01 ? "0.01未満" : mb.toFixed(2)}MB ／ 上限約5MB)`;
}
function countMonthArticles(key){
  const s = (state.months[key]||{}).signs || {};
  return Object.keys(s).filter(id=>s[id] && s[id].body).length;
}
async function clearCurrentMonth(){
  const n = countMonthArticles(state.current);
  if(n === 0){ toast(`${labelOf(state.current)}には記事がありません`, true); return; }
  if(!confirm(`${labelOf(state.current)}の${n}記事をすべて削除します。\n実行前に自動でバックアップを書き出します。\nよろしいですか?`)) return;
  exportBackup(); // 削除前に自動バックアップ
  delete state.months[state.current];
  if(await save()){ toast(`${labelOf(state.current)}を空にしました(バックアップ書き出し済み)`); render(); }
}
async function clearOldMonths(){
  const v = prompt("この年月「より前」の号をすべて削除します。\n基準の年月を入力(例:26 8 → 2026年8月号より前を削除。8月号は残ります)");
  if(!v) return;
  const { y, m } = classifyNums(pickNums(v));
  if(y === null || m === null){ toast("年月を読み取れませんでした(例:26 8)", true); return; }
  const boundary = keyOf(y, m);
  const targets = Object.keys(state.months).filter(k => k < boundary && countMonthArticles(k) > 0);
  if(!targets.length){ toast(`${labelOf(boundary)}より前に記事はありません`, true); return; }
  const total = targets.reduce((a,k)=>a+countMonthArticles(k), 0);
  if(!confirm(`${labelOf(boundary)}より前の ${targets.length}ヶ月分・${total}記事 をすべて削除します。\n実行前に自動でバックアップを書き出します。\nよろしいですか?`)) return;
  exportBackup(); // 削除前に自動バックアップ
  for(const k of Object.keys(state.months)){ if(k < boundary) delete state.months[k]; }
  if(await save()){ toast(`${targets.length}ヶ月分・${total}記事を削除しました(バックアップ書き出し済み)`); render(); }
}
async function clearAllPrev(){
  let n = 0;
  for(const k in state.months){
    const s = (state.months[k]||{}).signs || {};
    for(const id in s){ if(s[id] && s[id].prev) n++; }
  }
  for(const x of state.extras){ if(x.prev) n++; }
  if(n === 0){ toast("削除できる「前の版」はありません", true); return; }
  if(!confirm(`保存されている「前の版」${n}件をすべて削除して軽量化します。\n(現在の本文はすべて残ります。前の版に戻す機能だけ使えなくなります)\nよろしいですか?`)) return;
  for(const k in state.months){
    const s = (state.months[k]||{}).signs || {};
    for(const id in s){ if(s[id] && s[id].prev) delete s[id].prev; }
  }
  for(const x of state.extras){ if(x.prev) delete x.prev; }
  if(await save()){ toast(`前の版${n}件を削除しました`); render(); }
}

// 全角数字→半角に変換し、数字以外(「年」「月」など)は除去
// ※ \uFF10-\uFF19 = 全角の0〜9(文字コード指定で確実に)
function normDigits(v){
  return (v||"")
    .replace(/[\uFF10-\uFF19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[^0-9]/g, "");
}
// 文字列中の数字のかたまりを全部拾う("26 8"→[26,8]、"2026年8月"→[2026,8])
function pickNums(str){
  const s = (str||"").replace(/[\uFF10-\uFF19]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
  return (s.match(/\d{1,4}/g) || []).map(Number);
}
function fixYear(y){
  if(y == null) return null;
  if(y <= 99) y = 2000 + y;
  if(y < Y_MIN || y > Y_MAX) return null;
  return y;
}
// 数字の大きさで年か月かを自動判別する
// 1〜12 → 月、26〜99・2026〜2100 → 年。どの欄にどの順で打ってもOK
function classifyNums(nums){
  let y = null, m = null;
  for(const n of nums){
    if(n >= 1 && n <= 12){ if(m === null) m = n; }
    else { const fy = fixYear(n); if(fy !== null && y === null) y = fy; }
  }
  return { y, m };
}
// 年欄・月欄の両方の数字を集めて年月を割り出す
function resolveYM(){
  const nums = [
    ...pickNums(document.getElementById("pYear").value),
    ...pickNums(document.getElementById("pMonth").value)
  ];
  return classifyNums(nums);
}
function updatePickerInfo(){
  const { y } = resolveYM();
  const info = document.getElementById("pInfo");
  if(y === null){ info.textContent = ""; return; }
  const parts = [];
  for(let m=1; m<=12; m++){
    const mo = state.months[keyOf(y,m)];
    const n = mo ? Object.keys(mo.signs||{}).filter(k=>mo.signs[k] && mo.signs[k].body).length : 0;
    if(n > 0) parts.push(`${m}月号:${n}/12`);
  }
  info.textContent = parts.length
    ? `${y}年の格納状況 → ${parts.join("、")}`
    : `${y}年はまだ何も格納されていません`;
}
function goPicker(){
  const { y, m } = resolveYM();
  if(y === null){
    toast("年は 26〜99 の下2桁か 2026〜2100 で入力してください", true);
    document.getElementById("pYear").focus();
    return;
  }
  if(m === null){
    toast("月は 1〜12 で入力してください", true);
    document.getElementById("pMonth").focus();
    return;
  }
  state.current = keyOf(y, m);
  save(true);
  hideOverlay("picker");
  render();
}
function syncPickerFields(){
  // プルダウンだけ追従させる(入力中の欄は書き換えない)
  const { y, m } = resolveYM();
  if(y !== null) document.getElementById("pYearSel").value = y;
  if(m !== null) document.getElementById("pMonthSel").value = m;
  updatePickerInfo();
}
document.getElementById("monthTag").onclick = ()=>{
  const py = document.getElementById("pYear");
  const pm = document.getElementById("pMonth");
  const ys = document.getElementById("pYearSel");
  const ms = document.getElementById("pMonthSel");
  if(!ys.options.length){
    for(let y=Y_MIN; y<=Y_MAX; y++){ ys.add(new Option(y+"年", y)); }
    for(let m=1; m<=12; m++){ ms.add(new Option(m+"月号", m)); }
    ys.onchange = ()=>{
      py.value = String(ys.value).slice(-2);
      updatePickerInfo();
    };
    ms.onchange = ()=>{
      pm.value = ms.value;
      goPicker(); // 月を選んだら即表示
    };
  }
  const p = parseKey(state.current);
  py.value = String(p.y).slice(-2);
  pm.value = p.m;
  ys.value = p.y;
  ms.value = p.m;
  updatePickerInfo();
  showOverlay("picker");
  setTimeout(()=>{ py.focus(); py.select(); }, 100);
};
document.getElementById("pYear").addEventListener("input", syncPickerFields);
document.getElementById("pMonth").addEventListener("input", syncPickerFields);
document.getElementById("pYear").addEventListener("keydown", (ev)=>{
  if(ev.key === "Enter" && !ev.isComposing){
    ev.preventDefault();
    // 年の欄だけで年と月の両方が読み取れたとき(まとめ打ち)のみ即確定
    const own = classifyNums(pickNums(document.getElementById("pYear").value));
    if(own.y !== null && own.m !== null){ goPicker(); return; }
    const pm = document.getElementById("pMonth");
    pm.focus(); pm.select();
  }
});
document.getElementById("pMonth").addEventListener("keydown", (ev)=>{
  if(ev.key === "Enter" && !ev.isComposing){ ev.preventDefault(); goPicker(); }
});
document.getElementById("pCancel").onclick = ()=> hideOverlay("picker");
document.getElementById("pGo").onclick = goPicker;

// stars bg
(function(){
  const box = document.getElementById("stars");
  for(let i=0;i<40;i++){
    const s = document.createElement("i");
    s.style.left = Math.random()*100+"%";
    s.style.top = Math.random()*100+"%";
    s.style.animationDelay = (Math.random()*4)+"s";
    s.style.opacity = .1 + Math.random()*.35;
    box.appendChild(s);
  }
})();

load();
</script>
