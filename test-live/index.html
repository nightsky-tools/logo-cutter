<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テスト実験室 v2</title>
<style>
  body{background:#2f6b48;color:#fff;font-family:"Hiragino Kaku Gothic ProN",sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0}
  .card{text-align:center;padding:30px}
  .v{font-size:96px;font-weight:900;letter-spacing:.02em}
  h1{font-size:22px;font-weight:700;margin:0 0 6px}
  p{font-size:14px;opacity:.85;line-height:2}
</style>
</head>
<body>
<div class="card">
  <h1>テスト実験室 v2</h1>
  <div class="v">V2</div>
  <p>更新テスト用。v1の上に公開すると、この緑の画面に変わります。<br>このページが見えていれば、公開は成功しています。<br>
  <span id="now"></span></p>
</div>
<script>document.getElementById("now").textContent = "表示時刻: " + new Date().toLocaleString("ja-JP");</script>
</body>
</html>
