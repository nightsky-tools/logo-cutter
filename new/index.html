<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新月・満月データジェネレーター</title>
<style>
  :root {
    --night: #0c0f22;
    --panel: #14182f;
    --panel-edge: #232849;
    --moonlight: #e9e7f2;
    --dim: #8e8aa8;
    --new-moon: #a9c5e2;
    --full-moon: #f0d9a0;
    --copy-ok: #9fd8b4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--night);
    background-image:
      radial-gradient(1px 1px at 12% 18%, rgba(233,231,242,.55) 50%, transparent 51%),
      radial-gradient(1px 1px at 71% 8%,  rgba(233,231,242,.4)  50%, transparent 51%),
      radial-gradient(1px 1px at 88% 34%, rgba(233,231,242,.5)  50%, transparent 51%),
      radial-gradient(1px 1px at 33% 62%, rgba(233,231,242,.3)  50%, transparent 51%),
      radial-gradient(1px 1px at 56% 87%, rgba(233,231,242,.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 9% 79%,  rgba(233,231,242,.35) 50%, transparent 51%),
      radial-gradient(1px 1px at 94% 71%, rgba(233,231,242,.4)  50%, transparent 51%);
    color: var(--moonlight);
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    min-height: 100vh;
    padding: 28px 16px 64px;
  }
  .wrap { max-width: 720px; margin: 0 auto; }

  header { text-align: center; margin-bottom: 26px; }
  h1 {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-weight: 600;
    font-size: 1.45rem;
    letter-spacing: .14em;
  }
  .sub { color: var(--dim); font-size: .78rem; letter-spacing: .22em; margin-top: 8px; }

  .nav {
    display: flex; align-items: center; justify-content: center;
    gap: 14px; margin-bottom: 26px;
  }
  .nav button.arrow {
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--moonlight); width: 42px; height: 42px; border-radius: 50%;
    font-size: 1.05rem; cursor: pointer; transition: border-color .2s;
  }
  .nav button.arrow:hover, .nav button.arrow:focus-visible { border-color: var(--dim); }
  .nav select {
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--moonlight); border-radius: 10px;
    padding: 10px 12px; font-size: 1rem; cursor: pointer;
    font-family: inherit;
  }
  :focus-visible { outline: 2px solid var(--new-moon); outline-offset: 2px; }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 16px;
    padding: 22px 22px 18px;
    margin-bottom: 22px;
  }
  .card-head { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .moon-glyph { flex: none; width: 54px; height: 54px; }
  .kind {
    font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    font-size: 1.3rem; letter-spacing: .18em;
  }
  .kind.new  { color: var(--new-moon); }
  .kind.full { color: var(--full-moon); }
  .when { color: var(--moonlight); font-size: .95rem; margin-top: 3px; }
  .sign { color: var(--dim); font-size: .88rem; margin-top: 2px; }

  dl.detail { font-size: .86rem; line-height: 1.75; }
  dl.detail dt {
    color: var(--dim); font-size: .74rem; letter-spacing: .16em;
    margin-top: 12px;
  }
  dl.detail dd { margin-left: 0; }
  .aspect-none { color: var(--dim); }

  .copy-btn {
    display: block; width: 100%; margin-top: 18px;
    background: transparent;
    border: 1px solid var(--panel-edge);
    color: var(--moonlight);
    border-radius: 10px; padding: 12px;
    font-size: .92rem; font-family: inherit; letter-spacing: .1em;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .copy-btn:hover, .copy-btn:focus-visible { border-color: var(--dim); }
  .copy-btn.done { border-color: var(--copy-ok); color: var(--copy-ok); }

  .empty { text-align: center; color: var(--dim); padding: 48px 0; font-size: .9rem; }

  footer {
    text-align: center; color: var(--dim);
    font-size: .7rem; letter-spacing: .12em; margin-top: 36px; line-height: 1.9;
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>新月・満月データジェネレーター</h1>
    <div class="sub">命令書 §1 入力データ生成 ・ 2026–2030</div>
  </header>

  <div class="nav">
    <button class="arrow" id="prevBtn" aria-label="前の月">‹</button>
    <select id="yearSel" aria-label="年"></select>
    <select id="monthSel" aria-label="月"></select>
    <button class="arrow" id="nextBtn" aria-label="次の月">›</button>
  </div>

  <div id="cards"></div>

  <footer>
    データ: Swiss Ephemeris (pyswisseph) 事前計算 ・ JST ・ アスペクトは月相の±3日以内に正確<br>
    星座・度数は月の黄経に基づく
  </footer>
</div>

const $ = id => document.getElementById(id);
const YEARS = [2026, 2027, 2028, 2029, 2030];

function degStr(deg) {
  const d = Math.floor(deg);
  const m = Math.round((deg - d) * 60);
  return m === 0 ? `${d}度` : `${d}度${m}分`;
}

function moonSVG(kind) {
  if (kind === "新月") {
    return `<svg class="moon-glyph" viewBox="0 0 54 54" aria-hidden="true">
      <circle cx="27" cy="27" r="20" fill="#0a0d1e" stroke="#3a4066" stroke-width="1.5"/>
      <path d="M 38 13 A 20 20 0 0 1 38 41 A 26 26 0 0 0 38 13 Z" fill="rgba(169,197,226,.5)"/>
    </svg>`;
  }
  return `<svg class="moon-glyph" viewBox="0 0 54 54" aria-hidden="true">
    <circle cx="27" cy="27" r="23" fill="rgba(240,217,160,.13)"/>
    <circle cx="27" cy="27" r="20" fill="#f0d9a0"/>
    <circle cx="21" cy="21" r="4" fill="rgba(190,160,100,.35)"/>
    <circle cx="33" cy="30" r="3" fill="rgba(190,160,100,.3)"/>
    <circle cx="25" cy="34" r="2" fill="rgba(190,160,100,.28)"/>
  </svg>`;
}

function pairLine(p) {
  if (!p) return "―";
  return `${p.kind} ${p.jst}(${p.sign} ${degStr(p.deg)})`;
}

function aspectLines(ev) {
  if (!ev.aspects.length) return null;
  return ev.aspects.map(a => {
    const dateOnly = a.jst.replace(/^\d+年/, "");
    return `${a.bodies}の${a.aspect}(${dateOnly})`;
  });
}

function buildMarkdown(ev) {
  const asp = aspectLines(ev);
  const aspCell = asp ? asp.join("、") : "±3日以内に主要アスペクトなし";
  const signCell = ev.kind === "満月"
    ? `${ev.moon_sign} ${degStr(ev.moon_deg)}(太陽は${ev.sun_sign} ${degStr(ev.sun_deg)})`
    : `${ev.moon_sign} ${degStr(ev.moon_deg)}`;
  return [
    "| 項目 | 内容 |",
    "|---|---|",
    `| 種別 | ${ev.kind} |`,
    `| 日時(JST・分単位) | ${ev.jst} |`,
    `| 起こる星座と度数 | ${signCell} |`,
    `| 同時期の主要アスペクト(±3日以内) | ${aspCell} |`,
    `| 直前の対になる月相 | ${pairLine(ev.prev)} |`,
    `| 直後の対になる月相 | ${pairLine(ev.next)} |`,
  ].join("\n");
}

function copyText(text, btn) {
  const done = () => {
    btn.classList.add("done");
    btn.textContent = "コピーしました";
    setTimeout(() => {
      btn.classList.remove("done");
      btn.textContent = "Markdownをコピー";
    }, 1800);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallback());
  } else fallback();
  function fallback() {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); done(); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function render() {
  const y = +$("yearSel").value, m = +$("monthSel").value;
  const evs = LUNATIONS.filter(e => e.year === y && e.month === m);
  const box = $("cards");
  box.innerHTML = "";
  if (!evs.length) {
    box.innerHTML = `<div class="empty">この月のデータはありません</div>`;
    return;
  }
  evs.forEach(ev => {
    const card = document.createElement("div");
    card.className = "card";
    const asp = aspectLines(ev);
    const aspHtml = asp
      ? asp.map(s => `<div>${s}</div>`).join("")
      : `<div class="aspect-none">±3日以内に主要アスペクトなし</div>`;
    const signLine = ev.kind === "満月"
      ? `${ev.moon_sign} ${degStr(ev.moon_deg)} ・ 太陽は${ev.sun_sign} ${degStr(ev.sun_deg)}`
      : `${ev.moon_sign} ${degStr(ev.moon_deg)}`;
    card.innerHTML = `
      <div class="card-head">
        ${moonSVG(ev.kind)}
        <div>
          <div class="kind ${ev.kind === "新月" ? "new" : "full"}">${ev.kind}</div>
          <div class="when">${ev.jst} JST</div>
          <div class="sign">${signLine}</div>
        </div>
      </div>
      <dl class="detail">
        <dt>主要アスペクト(±3日以内)</dt>
        <dd>${aspHtml}</dd>
        <dt>直前の対になる月相</dt>
        <dd>${pairLine(ev.prev)}</dd>
        <dt>直後の対になる月相</dt>
        <dd>${pairLine(ev.next)}</dd>
      </dl>
      <button class="copy-btn">Markdownをコピー</button>
    `;
    card.querySelector(".copy-btn").addEventListener("click", e => {
      copyText(buildMarkdown(ev), e.currentTarget);
    });
    box.appendChild(card);
  });
}

function step(delta) {
  let y = +$("yearSel").value, m = +$("monthSel").value + delta;
  if (m < 1)  { m = 12; y--; }
  if (m > 12) { m = 1;  y++; }
  if (y < YEARS[0]) { y = YEARS[0]; m = 1; }
  if (y > YEARS[YEARS.length-1]) { y = YEARS[YEARS.length-1]; m = 12; }
  $("yearSel").value = y;
  $("monthSel").value = m;
  render();
}

(function init() {
  const ys = $("yearSel"), ms = $("monthSel");
  YEARS.forEach(y => ys.add(new Option(`${y}年`, y)));
  for (let m = 1; m <= 12; m++) ms.add(new Option(`${m}月`, m));
  const now = new Date();
  let y = now.getFullYear(), m = now.getMonth() + 1;
  if (y < YEARS[0]) { y = YEARS[0]; m = 1; }
  if (y > YEARS[YEARS.length-1]) { y = YEARS[YEARS.length-1]; m = 12; }
  ys.value = y; ms.value = m;
  ys.addEventListener("change", render);
  ms.addEventListener("change", render);
  $("prevBtn").addEventListener("click", () => step(-1));
  $("nextBtn").addEventListener("click", () => step(1));
  render();
})();
</script>
