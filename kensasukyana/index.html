<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星野ソラ 検品前スキャナ v2.0</title>
<style>
  :root{
    --bg:#0c111f;
    --panel:#141b2e;
    --panel2:#1a2340;
    --line:#2a3555;
    --ink:#dde4f5;
    --dim:#8b96b8;
    --star:#e8c56a;
    --ok:#6fd39a;
    --warn:#e8c56a;
    --bad:#f08a8a;
    --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace,"Hiragino Sans","Noto Sans JP",sans-serif;
    --sans:"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.7;}
  header{padding:26px 22px 18px;border-bottom:1px solid var(--line);
    background:
      radial-gradient(1px 1px at 12% 30%, #fff8 0, transparent 100%),
      radial-gradient(1px 1px at 28% 70%, #fff5 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 46% 25%, #ffd97a99 0, transparent 100%),
      radial-gradient(1px 1px at 63% 60%, #fff6 0, transparent 100%),
      radial-gradient(1px 1px at 78% 35%, #fff4 0, transparent 100%),
      radial-gradient(1.5px 1.5px at 91% 65%, #ffd97a88 0, transparent 100%),
      linear-gradient(180deg,#10182e,#0c111f);}
  header h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.06em;}
  header h1 .v{color:var(--star);font-size:12px;margin-left:8px;letter-spacing:.1em;}
  header p{margin:6px 0 0;color:var(--dim);font-size:12px;}
  main{max-width:980px;margin:0 auto;padding:20px 22px 80px;}
  .grid{display:grid;grid-template-columns:1fr;gap:14px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .card h2{margin:0 0 8px;font-size:13px;color:var(--star);letter-spacing:.08em;font-weight:700;}
  .card .note{color:var(--dim);font-size:12px;margin:0 0 8px;}
  textarea,input[type=text],select{width:100%;background:#0e1424;border:1px solid var(--line);border-radius:8px;
    color:var(--ink);padding:10px 12px;font-family:var(--sans);font-size:13px;line-height:1.6;}
  textarea:focus,input:focus,select:focus{outline:2px solid #3d4f86;border-color:#3d4f86;}
  textarea{resize:vertical;}
  #blob{min-height:260px;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:220px;}
  label{display:block;font-size:12px;color:var(--dim);margin:0 0 4px;}
  .runbar{display:flex;align-items:center;gap:14px;margin:18px 0;}
  button{cursor:pointer;border:none;border-radius:8px;font-family:var(--sans);font-weight:700;}
  #run{background:var(--star);color:#1a1608;font-size:15px;padding:12px 34px;letter-spacing:.1em;}
  #run:hover{filter:brightness(1.08);}
  #copy,#copyfixed{background:var(--panel2);color:var(--ink);border:1px solid var(--line);font-size:13px;padding:10px 20px;display:none;}
  #copyfixed{border-color:#6b5a28;color:var(--star);}
  #copy:hover,#copyfixed:hover{background:#223058;}
  #copiedmsg{color:var(--ok);font-size:12px;display:none;}
  #summary{display:none;margin:0 0 14px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{border-radius:999px;padding:3px 12px;font-size:12px;font-weight:700;border:1px solid;}
  .chip.ok{color:var(--ok);border-color:#2c5a41;background:#12281c;}
  .chip.warn{color:var(--warn);border-color:#6b5a28;background:#2a2410;}
  .chip.bad{color:var(--bad);border-color:#6b3232;background:#2a1414;}
  #report{display:none;background:#0e1424;border:1px solid var(--line);border-radius:10px;padding:16px;
    white-space:pre-wrap;font-family:var(--mono);font-size:12.5px;line-height:1.75;overflow-x:auto;}
  #report .ok{color:var(--ok);} #report .warn{color:var(--warn);} #report .bad{color:var(--bad);}
  #report .sec{color:var(--star);font-weight:700;}
  #report .dim{color:var(--dim);}
  footer{color:var(--dim);font-size:11px;text-align:center;padding:14px;}
  @media (max-width:640px){ main{padding:14px 12px 60px;} }
</style>
</head>
<body>
<header>
  <h1>星野ソラ 検品前スキャナ<span class="v">v2.0</span></h1>
  <p>機械的走査(列挙・件数)を全部このツールが行い、意味判定(主語・主根拠など)だけを検品チャットに残す前段ツール。レポートを本文と一緒に検品へ渡す。</p>
</header>
<main>
  <div class="grid">
    <div class="card">
      <h2>ここに貼るだけ</h2>
      <p class="note">記事本文をそのまま貼り付け。<b>天体データ(monthly_sky出力)や画像プロンプトが混ざっていても自動で仕分ける。</b>タイトル・対象星座も自動検出。貼った瞬間に走査が走る。</p>
      <textarea id="blob" placeholder="記事全文をここに貼り付け(天体データ・画像プロンプトを続けて貼ってもOK)"></textarea>
      <div class="row" style="margin-top:10px;align-items:center;">
        <div style="flex:0 0 200px;">
          <label for="sign">対象星座(自動検出・手動で上書き可)</label>
          <select id="sign">
            <option value="">— 自動検出できず —</option>
            <option>牡羊座</option><option>牡牛座</option><option>双子座</option><option>蟹座</option>
            <option>獅子座</option><option>乙女座</option><option>天秤座</option><option>蠍座</option>
            <option>射手座</option><option>山羊座</option><option>水瓶座</option><option>魚座</option>
          </select>
        </div>
        <div>
          <label>自動仕分けの結果</label>
          <div id="detected" style="font-size:12px;color:var(--dim);padding:9px 0;">— 貼り付け待ち —</div>
        </div>
      </div>
    </div>
  </div>

  <div class="runbar">
    <button id="run">再走査</button>
    <button id="copy">レポートをコピー</button>
    <button id="copyfixed">修正済みテキストをコピー</button>
    <span id="copiedmsg">コピーしました</span>
  </div>

  <div id="summary" class="card"><h2>サマリー</h2><div class="chips" id="chips"></div>
    <p id="fixinfo" class="note" style="margin:10px 0 0;"></p></div>
  <div id="report"></div>
</main>
<footer>検品前スキャナ v2.0(貼るだけ自動走査) ｜ 走査はこのツール、意味判定は検品チャット。辞書はHTMLソース冒頭の DICT を編集。</footer>

<script>
/* =====================================================================
   ★ 辞書・設定(編集エリア)ここから

   【v2.0 変更履歴】(生成命令書v10.9・検品命令書v10.7対応)
   ・固定文言を①②の2本から①〜⑥の6本へ拡張([5])。
     ③導入の断言文(名詞スロットのみ可変・正規表現FIXED_3_REで照合)
     ④「準備はいいですか。」(決意喚起段落の冒頭)
     ⑤第9章リード第一文(月相ケース1〜3のみ適用のため不在は▲要判定。
       括弧は全角が正だが既刊互換のため半角()も一致として許容)
     ⑥第9章末尾の「占いは、あなたの決断を代わりにするものではありません。〜」
   ・固定文言②の位置検査を追加([5])。v10.9でアンカーが「ロードマップです。
     段落の直後」から「固定文言④(準備はいいですか)段落の直前」のみに変更
     されたため、②の直後(空行を挟んで)が「準備はいいですか」で始まるかを見る。
   ・[16]導入鋳型走査を新設(DICT.INTRO_CLONE)。理想例からの転写で毎月同文化
     していた導入の鋳型(「静かな問いを感じていませんか」等)を列挙し▲要判定。
     前月号と同型かの最終判定は検品C-2b/生成v10.9第II部3・4が行う。
   ・[17]結論一文目走査を新設。各章【結論】の一文目を抽出し、「テーマは/
     ルールは」型の宣言が上限(DICT.THEME_DECL_LIMIT=3章)を超えたら✕。
     9月号で【結論】一文目が5章同型だった実績への対策。
   ・[15]を「頻出語レポート」に拡張(形容・副詞に加え、定型名詞
     「合図」「切り替わ」を監視語へ追加)。

   【v1.9 変更履歴】
   ・[3]にMarkdown記法の検出を追加(行頭の #/##/###・「- 」「* 」・---・>)。
     9月号改稿版でMarkdown混入がどの網にも掛からず素通りした実績への対策。
     行頭【第N章】前提のパイプラインを壊すため1件でも✕(生成命令書v10.8)。
   ・[15]頻出形容・副詞レポートを新設(DICT.STYLE_WATCHの語を数え、
     STYLE_LIMIT以上で▲要判定。文体の使い回し検知・生成命令書v10.8第IV部3)。

   【v1.8 変更履歴】
   ・9月号(牡羊座)で「太陽の主根拠3ブロック」「深掘り一文目の同型6章」
     「しなさい見出し6章」が検品まで素通りした実績への対策として、
     機械検出を3つ追加した(生成命令書v10.7のStep内走査4項目化と対応):
     [7] 章小見出しの「〜なさい」止めカウント(上限3・超過は✕。「しなさい」限定だと「戻りなさい」等を取りこぼすため命令形止め全般で判定)
     [8] 深掘り一文目の抽出と型カウント(A:星座名で始める型/B:「けれど…
         空…告げて/後押し」の受け型。Bは3章以上で✕、Aは3章以上で▲要判定)
     [14] 導入+第1〜6章の理由ブロックのイベント語集計(同一語が3ブロック
         以上で▲要判定。主根拠かどうかの意味判定は検品B-4(a)が行う。
         この集計は検品の集計表の下書きである)

   【v1.7 変更履歴】
   ・PAST_WORDS を7語→9語に拡張(「てきてい」「ここ数ケ月」を追加)。
     検品命令書v10.4・修正命令書v10.4の「9語(スキャナと同一)」の記述と、
     ようやく現物が一致した(v1.6までは7語で、命令書側が先行していた)。
     「てきてい」は「てきています」「てきていた」型の進行・継続語尾を捕捉する。
   ・[11]のフック照合を「完全形+語幹」に強化(DICT.HOOK_STEMS:輝・変え・変わ)。
     活用形での回避(「輝かせる」「変えよ」等)を捕捉する。あわせて、禁止語を
     部分文字列として含むだけの複合語(「生まれ変わる」等・DICT.HOOK_MASK)は
     マスクして除外し、除外した旨をレポートに明示する(検品命令書v10.4
     A-12(b)が参照する「スキャナv1.7以降」の仕様の実装)。

   【v1.6 変更履歴】
   ・第8章の4定型見出しが完全一致しないとき、括弧()（）・コロン:：を正規化して
     再照合し、「文言は定型どおり・約物のみ不一致(半角括弧など)」と原因を
     診断して表示するようにした(v1.5までは「不一致」としか出ず、半角括弧が
     原因の号で警告が流される事故があった)。
   ・タイトルのフック部に例文フック禁止語(DICT.HOOK_BANNED・生成命令書v10.4
     改訂1)が含まれていないかの照合を[11]に追加。過去タイトル一覧がなくても
     この照合は常に行える。
   ・FIXED_1のコメントを更新(v10.3以降は各命令書の条文も地の文掲載で一重カギ
     に統一済みのため、入れ子表記の注記を簡略化)。

   【v1.5 変更履歴】
   ・FIXED_1 を記事上の実体(一重カギ「運勢」)に修正。
     v1.4までは生成命令書の条文表記『運勢』(引用の入れ子で二重カギ化した形)を
     そのまま登録していたため、正しい記事に対して毎回「固定文言①不一致」の
     誤検出が出ていた。記事上の正は一重カギ。命令書の理想例と過去号に一致。
   ・parseBlob の天体データ仕分けを monthly_sky.py の実出力形式に対応。
     「・9月11日(金) 12:27 乙女座で新月」のような行頭「・」付きの行、
     「■ 新月・満月」等の見出し行、「(順行へ戻るのは〜)」等の継続行を
     天体データとして正しく除外できるようにした(v1.4では行頭「・」で
     日付判定が外れ、本文扱いになっていた)。
   ・設定指紋は互換維持のため FIXED_2 のみ(記事保管庫側と式を揃えて変更する
     までは FIXED_1 を含めない。含める場合は両ツール同時に変更すること)。
   ===================================================================== */
const DICT = {

  // A-5 過去構文の走査語(主語判定は検品チャットが行う)
  // v1.7で9語に拡張。生成命令書v10.5・検品/修正v10.4と同期。
  PAST_WORDS: ["てきました","てきてい","てきた","これまで","先月まで","ここ数ヶ月","ここ数カ月","ここ数か月","ここ数ケ月"],

  // A-6 季節語・暦語(長い語を先に照合するので順不同でよい。単漢字は最後の網)
  SEASON_WORDS: [
    "この夏","真夏","夏バテ","夏の疲れ","残暑","猛暑","梅雨","春風","花冷え","新緑",
    "秋の夜長","紅葉","木枯らし","冬本番","年の瀬","年末","年内","年明け","年始",
    "来年","今年中","この1年","この一年","年を越","年をまた","年度末","新年度",
    "新学期","新生活","師走","正月","お盆","クリスマス","初詣","ゴールデンウィーク","連休",
    "春","夏","秋","冬"
  ],

  // B-7 決め台詞
  DANGEN: "断言します",
  DANGEN_LIMIT: 2,

  // A-7(g) 固定文言(一字一句)
  // ※FIXED_1は「記事上の実体」で登録する。一重カギ「運勢」が正
  //   (生成・検品・修正・校閲の各v10.3以降は条文も地の文掲載で一重カギに統一済み)。
  FIXED_1: "多くの占いは「運勢」を語りますが、このnoteは違います",
  FIXED_2: "この一冊には、3,000円以上の価値があると自負しています。それでも、価格を理由にあなたがこの1ヶ月を逃すことがないように。毎月15日までは、コーヒー1杯分の「500円」で。16日からは「1,000円」でお届けしています。",

  // v2.0: 固定文言③〜⑥(生成命令書v10.9)
  // ③導入の断言文。名詞スロット(その〇〇=問い/感覚/違和感 等・1〜8字)のみ可変。
  FIXED_3_RE: /断言します。その.{1,8}は決して気のせいではありません。/,
  // ④決意喚起段落の冒頭(一字一句)
  FIXED_4: "準備はいいですか。",
  // ⑤第9章リード第一文(月相ケース1〜3のみ。ケース4・5〈満月なし/新月なし〉の号は適用除外のため不在は▲)
  //   括弧は全角（）が正。既刊互換のため半角()も一致として許容する。
  FIXED_5_RE: /昔から、新しい月[（(]新月[）)]は「種をまく・願いを書く」タイミング、満ちた月[（(]満月[）)]は「実りを受け取る・手放す」タイミングとされてきました。/,
  // ⑥第9章【ワークの進め方】末尾(一字一句)
  FIXED_6: "占いは、あなたの決断を代わりにするものではありません。月のリズムに合わせて、自分の心を見つめ直すきっかけ。そう思って、気軽に取り入れてみてください。",

  // v2.0: [16]導入鋳型(理想例からの転写検出語。固定文言③④に昇格した文は含めない)
  INTRO_CLONE: ["静かな問いを感じていませんか","ただ過ぎていくひと月ではありません","極めて重要な「","のロードマップです","胸を張ったまま、今度は"],
  // v2.0: [17]結論一文目の「テーマは/ルールは」型宣言の上限(生成命令書v10.9第II部5)
  THEME_DECL_LIMIT: 3,

  // 第8章の4定型見出し(一字一句)
  CH8_HEADINGS: [
    "【対 火の星座（牡羊座・獅子座・射手座）】",
    "【対 地の星座（牡牛座・乙女座・山羊座）】",
    "【対 風の星座（双子座・天秤座・水瓶座）】",
    "【対 水の星座（蟹座・蠍座・魚座）】"
  ],

  // A-3b 支配部位(第6章のみ走査。単独の「手」「足」は誤検出が多いため不使用)
  BODY_PARTS: {
    "牡羊座":["頭","顔"],
    "牡牛座":["首","喉","甲状腺"],
    "双子座":["肩","腕","肺","神経"],
    "蟹座":["胸","胃","乳房"],
    "獅子座":["心臓","背中","脊椎","背骨"],
    "乙女座":["腸","消化器","胃腸"],
    "天秤座":["腰","腎臓"],
    "蠍座":["生殖器","排泄器","泌尿器"],
    "射手座":["太もも","ヒップ","肝臓"],
    "山羊座":["骨","膝","関節","皮膚","歯"],
    "水瓶座":["ふくらはぎ","足首","血行","循環"],
    "魚座":["足先","リンパ","免疫","足裏"]
  },
  // 未成年配慮:記事のどこにあっても言い換え対象として警告する語
  SENSITIVE_PARTS: ["生殖器","排泄器","泌尿器","乳房"],

  // A-12(b) 例文フック禁止語(生成命令書v10.4改訂1。過去タイトル一覧がなくても照合する)
  HOOK_BANNED: ["輝き","輝く","本物の実力","真の実力","変える","変えていく","変わる"],
  // v1.7: 語幹照合(活用形の回避を捕捉)と、禁止語を含むだけの複合語のマスク(誤検出防止)
  HOOK_STEMS: ["輝","変え","変わ"],
  HOOK_MASK: ["生まれ変わ","様変わり","移り変わ"],

  // B-1(c) 星座名冠り深掘り見出しの上限(生成命令書v10.2)
  KANMURI_LIMIT: 2,

  // v1.8: 章小見出しの「〜しなさい」止め上限 / 深掘り一文目の型の上限(生成命令書v10.7)
  HEAD_SHINASAI_LIMIT: 3,
  DIG_TYPE_LIMIT: 2,
  // v1.8: [14]理由ブロックのイベント語(出現＝主根拠ではない。集計の下書き)
  REASON_TOKENS: ["太陽","水星","金星","火星","木星","土星","天王星","海王星","冥王星","新月","満月","逆行"],
  // v1.9: [15]頻出形容・副詞の監視語(号のテーマ語は多くても◯。編集可)と目安回数
  STYLE_WATCH: ["静かに","静けさ","丁寧に","穏やかに","落ち着いて","そっと","やさしく","合図","切り替わ"],
  STYLE_LIMIT: 8,

  // 見出しコロンの方針: "report"=件数報告のみ / "zenkaku"=半角を違反 / "hankaku"=全角を違反
  COLON_POLICY: "report",

  // 自動修正(一意に直せるものだけ)の置換テーブル
  AUTOFIX_SENSITIVE: [
    ["生殖器・排泄器", "お腹の奥・体の深部"],
    ["生殖器", "お腹の奥"],
    ["排泄器", "体の深部(巡りと排出)"],

const $ = id => document.getElementById(id);
const z2h = s => s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// ---- 位置ラベル(直前の章見出し) ----
function buildHeadingIndex(text){
  const idx = [];
  const re = /【(はじめに|第[1-9１-９]章)[^】]*】/g;
  let m;
  while((m = re.exec(text))){
    let label = m[1].startsWith("第") ? z2h(m[1]) : "導入(はじめに)";
    idx.push({pos:m.index, label});
  }
  return idx;
}
function locate(hIdx, pos){
  let label = "冒頭(タイトル付近)";
  for(const h of hIdx){ if(h.pos <= pos) label = h.label; else break; }
  return label;
}
// ---- 該当文の切り出し ----
function sentenceAt(text, pos, len){
  const bounds = "。！？\n";
  let s = pos, e = pos + len;
  while(s > 0 && !bounds.includes(text[s-1])) s--;
  while(e < text.length && !bounds.includes(text[e])) e++;
  let sent = text.slice(s, Math.min(e+1, text.length)).trim();
  if(sent.length > 110) sent = sent.slice(0, 110) + "…";
  return sent;
}
// ---- 重なりを避けた辞書走査(長い語優先) ----
function dictScan(text, words, offset=0){
  const sorted = [...words].sort((a,b)=>b.length-a.length);
  const taken = [];
  const hits = [];
  for(const w of sorted){
    let from = 0, i;
    while((i = text.indexOf(w, from)) !== -1){
      const overlap = taken.some(r => i < r[1] && i + w.length > r[0]);
      if(!overlap){ taken.push([i, i+w.length]); hits.push({word:w, pos:i+offset, localPos:i, len:w.length}); }
      from = i + 1;
    }
  }
  hits.sort((a,b)=>a.pos-b.pos);
  return hits;
}
function section(text, startPat, endPat){
  const s = text.search(startPat);
  if(s === -1) return null;
  let e = text.length;
  if(endPat){ const rest = text.slice(s+1).search(endPat); if(rest !== -1) e = s + 1 + rest; }
  return {start:s, end:e, text:text.slice(s,e)};
}

// ---- 貼り付け1本からの自動仕分け ----
function parseBlob(blob){
  const lines = blob.split("\n");
  const skyLines = [], artLines = [];
  const evWord = /(新月|満月|逆行|順行|へ入|に入|移動|イングレス|食)/;
  for(const line of lines){
    const t = line.trim();
    const isoStart = /^\d{4}-\d{2}-\d{2}/.test(t);
    // v1.5: monthly_sky出力の行頭「・」に対応(「・9月11日(金) 12:27 乙女座で新月」等)
    const dateStart = /^[・･]?\s*([0-9０-９]{1,2})[\/／月][0-9０-９]{1,2}日?/.test(t);
    // v1.5: 天体データの見出し行(「■ 新月・満月」「※使用天体暦:〜」「【〇年〇月の天体イベント一覧】」)
    const skyHeader = (/^[■※]/.test(t) && /(新月|満月|逆行|順行|天体|天文|星座移動|JST|swisseph|国立天文台)/i.test(t))
                      || /天体イベント一覧/.test(t);
    // v1.5: 滞在・逆行の箇条書き行と「(順行へ戻るのは〜)」継続行(句点を含む本文の文は除外)
    const skyBullet = /^[・･（(]/.test(t)
                      && /(滞在|逆行中|逆行はなし|順行へ戻る|逆行開始|逆行を開始)/.test(t)
                      && !t.includes("。") && t.length < 70;
    if(isoStart || skyHeader || skyBullet || (dateStart && evWord.test(t) && !t.includes("。") && t.length < 70)){
      skyLines.push(line);
    }else{
      artLines.push(line);
    }
  }
  // 画像プロンプト:英語主体 or watercolor を含む段落を分離
  const paras = artLines.join("\n").split(/\n\s*\n/);
  const prompts = [], artParas = [];
  for(const para of paras){
    const t = para.trim();
    if(!t){ continue; }
    const ascii = (t.match(/[A-Za-z]/g)||[]).length;
    const isPrompt = /watercolor art style/i.test(t) || (t.length > 30 && ascii / t.length > 0.55);
    (isPrompt ? prompts : artParas).push(t);
  }
  const article = artParas.join("\n\n");
  // タイトル:定型行を検出
  let title = "";
  for(const line of article.split("\n")){
    if(/^【[0-9０-９]{1,2}月限定】.*【保存版】/.test(line.trim())){ title = line.trim(); break; }
  }
  // 対象星座:「〇〇座のあなた」から検出
  let sign = "";
  const sm = article.match(/(牡羊|牡牛|双子|蟹|獅子|乙女|天秤|蠍|射手|山羊|水瓶|魚)座のあなた/);
  if(sm) sign = sm[1] + "座";
  return {article, sky: skyLines.join("\n").trim(), prompts, title, sign, skyLines};
}

        const dg = body.indexOf("【深掘り", rm);
        if(dg !== -1) e2 = dg;
        body = body.slice(rm, e2);
      }else{ scoped = false; }
      blocks.push({name:"第"+n+"章"+(scoped?"":"(理由見出し未検出・章全体を走査)"), text:body});
    }
    if(blocks.length < 2){ L.push({cls:"dim", s:"  スキップ(導入・章の切り出しに失敗)"}); }
    else{
      const agg = {};
      blocks.forEach(b=>{
        const found = DICT.REASON_TOKENS.filter(tok=> b.text.includes(tok));
        found.forEach(tok=>{ (agg[tok] = agg[tok] || []).push(b.name); });
      });
      const keys = Object.keys(agg);
      if(!keys.length){ L.push({cls:"dim", s:"  イベント語の出現なし"}); }
      else{
        let over = 0;
        keys.forEach(k=>{
          const n = agg[k].length;
          const line = "  ・"+k+":"+agg[k].join("・")+"="+n+"ブロック";
          if(n >= 3){ over++; L.push({cls:"warn", s:line+"【要判定】主根拠として3ブロック以上なら上限2超過(検品B-4(a)。振り替えの目安:金運=金星/新月、愛=金星/満月、人間関係=満月、仕事=水星、健康=星座の性質)"}); }
          else L.push({s:line});
        });
        L.push({cls:"dim", s:"  ※語の出現＝主根拠ではない(軽い言及はカウント外)。主根拠の判定と最終集計は検品B-4(a)が行う。この表はその下書き。第1〜6章は【〜3つの理由】ブロック内のみ、導入は全文を走査。"});
        chips.push(over ? {cls:"warn", label:"理由イベント "+over+"語が3+"} : {cls:"ok", label:"理由イベント 分散◯"});
      }
    }
  }
  L.push({s:""});

  // ---------- [15] 頻出語レポート(文体の使い回し・v1.9新設・v2.0で名詞を追加) ----------
  L.push({cls:"sec", s:"[15] 頻出語レポート(形容・副詞・定型名詞。検品B系の参考・生成命令書v10.8第IV部3)"});
  {
    const rows = (DICT.STYLE_WATCH||[]).map(w=>{
      let c=0, f=0, i;
      while((i = raw.indexOf(w, f)) !== -1){ c++; f = i + 1; }
      return {w, c};
    }).filter(r=> r.c > 0).sort((a,b)=> b.c - a.c);
    if(!rows.length){ L.push({cls:"dim", s:"  監視語の出現なし"}); }
    else{
      let over = 0;
      rows.forEach(r=>{
        if(r.c >= DICT.STYLE_LIMIT){ over++; L.push({cls:"warn", s:"  ▲「"+r.w+"」="+r.c+"回(目安"+DICT.STYLE_LIMIT+"回)【要判定】号のテーマ語なら◯、単なる使い回しなら類語へ散らす"}); }
        else L.push({s:"  ・「"+r.w+"」="+r.c+"回"});
      });
      if(over){ chips.push({cls:"warn", label:"頻出語 "+over+"語が目安超"}); }
      else L.push({cls:"ok", s:"  ◯ 監視語はいずれも目安("+DICT.STYLE_LIMIT+"回)未満"});
      L.push({cls:"dim", s:"  ※監視語はDICT.STYLE_WATCHで編集可。タイトルフックの主要語(号のテーマ語)は多くても◯。"});
    }
  }
  L.push({s:""});

  // ---------- [16] 導入鋳型走査(理想例転写の検出・v2.0新設) ----------
  L.push({cls:"sec", s:"[16] 導入鋳型走査(検品C-2b/生成v10.9第II部3・4用)"});
  {
    const cloneHits = [];
    (DICT.INTRO_CLONE||[]).forEach(w=>{
      let f=0,i; while((i=raw.indexOf(w,f))!==-1){ cloneHits.push({w,pos:i}); f=i+1; }
    });
    if(!cloneHits.length){
      L.push({cls:"ok", s:"  ◯ 0件(理想例鋳型の転写検出語は該当なし)"});
      chips.push({cls:"ok", label:"導入鋳型 0件"});
    }else{
      cloneHits.forEach((h,i)=> L.push({s:"  ("+(i+1)+") ["+locate(hIdx,h.pos)+"]「"+h.w+"」→ "+sentenceAt(raw,h.pos,h.w.length)}));
      L.push({cls:"warn", s:"  ▲ 計"+cloneHits.length+"件【要判定】理想例の文型を語だけ差し替えた鋳型転写でないか、前月号と同文型でないかを検品/生成側で確認(生成v10.9第II部3の例文鋳型禁止・書き出し型ローテーション)。固定文言③④に昇格した文はこの走査の対象外。"});
      chips.push({cls:"warn", label:"導入鋳型 "+cloneHits.length+"件 要判定"});
    }
  }
  L.push({s:""});

  // ---------- [17] 結論一文目走査(テーマ宣言型の上限・v2.0新設) ----------
  L.push({cls:"sec", s:"[17] 結論一文目走査(「テーマは/ルールは」型・上限"+DICT.THEME_DECL_LIMIT+"章・生成v10.9第II部5)"});
  {
    const kRe = /【結論】\s*\n?\s*([^\n]{0,120})/g;
    const firsts = []; let km;
    while((km=kRe.exec(raw))){
      let s1 = km[1];
      const per = s1.indexOf("。");
      if(per !== -1) s1 = s1.slice(0, per+1);
      firsts.push({pos:km.index, s:s1});
    }
    if(!firsts.length){
      L.push({cls:"warn", s:"  ▲ 【結論】ブロックを検出できず(形式崩れの可能性。検出0本は◯ではない)"});
    }else{
      const decl = firsts.filter(f=> /のテーマは|のルールは/.test(f.s));
      firsts.forEach(f=> L.push({s:"  ・["+locate(hIdx,f.pos)+"] "+f.s + (/のテーマは|のルールは/.test(f.s)?" ←宣言型":"")}));
      L.push({s:"  ◇「テーマは/ルールは」型="+decl.length+"本(上限"+DICT.THEME_DECL_LIMIT+")"});
      if(decl.length<=DICT.THEME_DECL_LIMIT){ L.push({cls:"ok", s:"  ◯ 上限内"}); chips.push({cls:"ok", label:"結論宣言型 "+decl.length+"本"}); }
      else{ L.push({cls:"bad", s:"  ✕ "+decl.length+"本(上限"+DICT.THEME_DECL_LIMIT+")→超過分の【結論】一文目を断定の宣言・問いかけ・場面型など別の書き出しへ(生成v10.9第II部5)"}); chips.push({cls:"bad", label:"結論宣言型 "+decl.length+"本"}); }
    }
  }
  L.push({s:""});

  // ---------- [13] 自動仕分けの除外内容(誤仕分けの可視化) ----------
  L.push({cls:"sec", s:"[13] 自動仕分けで本文から除外した内容(誤仕分けチェック用)"});
  if(P.skyLines.length===0 && promptsList.length===0){
    L.push({cls:"ok", s:"  ◯ 除外なし(貼り付け全文を本文として走査)"});
  }else{
    if(P.skyLines.length){
      L.push({s:"  ◇天体データとして除外("+P.skyLines.length+"行):"});
      P.skyLines.forEach(l=> L.push({cls:"dim", s:"   ・"+l.trim()}));
    }
    if(promptsList.length){
      L.push({s:"  ◇画像プロンプトとして除外("+promptsList.length+"段落):"});
      promptsList.forEach(pr=> L.push({cls:"dim", s:"   ・"+(pr.length>60?pr.slice(0,60)+"…":pr)}));
    }
    L.push({cls:"warn", s:"  ▲ 上記に本文の一部(箇条書きの日付行など)が混ざっていないか一読して確認。混ざっていたら該当行に「。」を付けるか手動で戻して再走査。"});
  }
  L.push({s:""});
  L.push({cls:"dim", s:"―― 以上。検品チャットへは「本文+このレポート」を渡し、検品命令書の走査系項目はこのレポートを正とする。"});

  // ---------- render ----------
  $("chips").innerHTML = chips.map(c=>'<span class="chip '+c.cls+'">'+esc(c.label)+'</span>').join("");
  $("summary").style.display = "block";
  $("report").innerHTML = L.map(l=>{
    const cls = l.cls ? ' class="'+l.cls+'"' : "";
    return "<span"+cls+">"+(l.cls? esc(l.s) : esc(l.s))+"</span>";
  }).join("\n");
  $("report").style.display = "block";
  window.__reportText = L.map(l=>l.s).join("\n");

  // ---------- 自動修正(一意に直せるものだけ) ----------
  const fixes = [];
  let fixed = raw;
  // (1) 半角?! → 全角
  let c1=0; fixed = fixed.replace(/\?/g, ()=>{c1++; return "？";}).replace(/!/g, ()=>{c1++; return "！";});
  if(c1) fixes.push("半角?!→全角:"+c1+"件");
  // (2) 日本語間の半角スペース削除(第8章定型見出し内の正規スペースは保護)
  let protectedText = fixed;
  DICT.CH8_HEADINGS.forEach(h=>{ protectedText = protectedText.split(h).join("\u0000".repeat(h.length)); });
  let c2=0; let out="";
  for(let i=0;i<fixed.length;i++){
    if(fixed[i]===" " && i>0 && i<fixed.length-1
       && /[ぁ-んァ-ヶ一-龯々ー]/.test(fixed[i-1]) && /[ぁ-んァ-ヶ一-龯々ー]/.test(fixed[i+1])
       && protectedText[i]!=="\u0000"){ c2++; continue; }
    out += fixed[i];
  }
  fixed = out;
  if(c2) fixes.push("日本語間の半角スペース削除:"+c2+"件");
  // (3) v1.5: 二重カギの固定文言①を一意復元(記事上の正は一重カギ)
  const F1_NIJU = "多くの占いは『運勢』を語りますが、このnoteは違います";
  if(fixed.includes(F1_NIJU)){
    const n = fixed.split(F1_NIJU).length-1;
    fixed = fixed.split(F1_NIJU).join(DICT.FIXED_1);
    fixes.push("固定文言①『運勢』→「運勢」:"+n+"件");
  }
  // (4) 乙女座の「胃腸」→「腸・消化器」(対象星座が乙女座のときのみ)
  if(sign==="乙女座" && fixed.includes("胃腸")){
    const n = fixed.split("胃腸").length-1;
    fixed = fixed.split("胃腸").join("腸・消化器");
    fixes.push("「胃腸」→「腸・消化器」:"+n+"件(乙女座)");
  }
  // (5) 未成年言い換え語の置換(長い語から順に)
  for(const [from,to] of DICT.AUTOFIX_SENSITIVE){
    if(fixed.includes(from)){
      const n = fixed.split(from).length-1;
      fixed = fixed.split(from).join(to);
      fixes.push("「"+from+"」→「"+to+"」:"+n+"件");
    }
  }
  window.__fixedText = fixed;
  window.__fixesApplied = fixes;
  if(fixes.length){
    $("fixinfo").innerHTML = "自動修正できる箇所:" + fixes.join(" / ") + "(それ以外の指摘は修正済みテキストにも残る=検品・手動対応)";
    $("copyfixed").style.display = "inline-block";
  }else{
    $("fixinfo").innerHTML = "自動修正の対象(半角?!・不正スペース・固定文言①の二重カギ・胃腸・要言い換え語)は0件。";
    $("copyfixed").style.display = "none";
  }
  $("copy").style.display = "inline-block";
  $("copiedmsg").style.display = "none";
  $("report").scrollIntoView({behavior:"smooth"});
}

$("run").addEventListener("click", runScan);
let _t = null;
$("blob").addEventListener("input", ()=>{
  clearTimeout(_t);
  const len = $("blob").value.trim().length;
  if(len < 200) return;           // 断片では走らせない
  _t = setTimeout(runScan, 500);  // 貼り付け後、自動走査
});
$("sign").addEventListener("change", ()=>{ $("sign").dataset.manual = "1"; if($("blob").value.trim().length >= 200) runScan(); });
$("copyfixed").addEventListener("click", async ()=>{
  const t = window.__fixedText || "";
  try{ await navigator.clipboard.writeText(t); }
  catch(e){
    const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  $("copiedmsg").style.display="inline";
  setTimeout(()=>{ $("copiedmsg").style.display="none"; }, 2000);
});
// 設定指紋:保管庫と固定文言②が一致しているかを照合(価格改定の反映漏れ検出)+設定価格の常時表示
// ※v1.5:指紋は互換維持のためFIXED_2のみ。FIXED_1を含める場合は保管庫側と同時に式を変更すること。
(function(){
  function cfgFp(str){let h=5381;for(let i=0;i<str.length;i++){h=((h<<5)+h+str.charCodeAt(i))>>>0;}return h.toString(16);}
  try{
    const prices=(DICT.FIXED_2.match(/「[0-9,，]+円」/g)||[]).join("・");
    const f=document.querySelector("footer");
    if(f) f.textContent += " ｜ 設定中の価格:"+prices;
    const fp=cfgFp(DICT.FIXED_2);
    let reg={}; try{ reg=JSON.parse(localStorage.getItem("hoshino-config-fp")||"{}"); }catch(e2){}
    reg.scanner={fp,ts:Date.now()};
    localStorage.setItem("hoshino-config-fp",JSON.stringify(reg));
    if(reg.vault && reg.vault.fp!==fp){
      const d=document.createElement("div");
      d.style.cssText="background:#2a1414;color:#f08a8a;border-bottom:1px solid #6b3232;padding:8px 22px;font-size:12px;line-height:1.6;";
      d.textContent="⚠ 記事保管庫と固定文言②が一致していません(価格改定の反映漏れの可能性)。両ツールの★設定/DICTを確認してください。";
      document.body.insertBefore(d, document.body.firstChild);
    }
  }catch(e){}
})();
$("copy").addEventListener("click", async ()=>{
  const t = window.__reportText || "";
  try{ await navigator.clipboard.writeText(t); }
  catch(e){
    const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta);
    ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
  }
  $("copiedmsg").style.display="inline";
  setTimeout(()=>{ $("copiedmsg").style.display="none"; }, 2000);
});
</script>
